body:
  text: 宋季三朝政要卷五少帝乙亥德祐元年春正月癸酉朔詔求言張仲微兵部侍郎修國史常楙援晉太子申事乞為濟王立後不報大元國兵順流而下沿江諸將多吕氏部曲望風降附至黃州陳奕以城降至蘄州管景謨以城降至南康軍葉閶以城降下江州錢真孫以帥兼守舉城降九江為江西屏蔽陷則江西如破竹矣至安慶府范文虎乃吕氏之壻遂以城降劉整死初整與文煥分兵南渡及是整無功發憤死於無為軍城下丁亥賈似道出師建督戊子離京城以王鑰為左丞相以章鑑為右丞相陳宜中知樞密院當國小事專決大事則督府遙制之似道集諸路兵共十三萬金帛輜重舳艫相銜百餘里由新安池口迂道而行數日始至蕪湖而舒池已降矣傳者以謂似道護駕入海以致諸郡先降二月戊午似道遣宋京使軍前請京與北使來要似道自往似道遣阮思聰火元嚞代行及至思聰回知事不就惶怖失據隂備快船為走計辛酉屯丁家洲時大軍大勢衝下南北兩岸立炮座設划車中流數千艘乘風直進我師不戰諸軍有反噬之意似道遂許喝轉官資諸軍詬曰要官資做甚己未庚申官資何在似道不能答癸亥三鼓孫虎臣告急至似道舟中泣告曰追兵已迫夏貴亦曰彼衆我寡委難抵當垂泣而去似道鳴鑼一聲退兵于珠金砂十三萬軍一時潰散督府之印已失乃奔入揚州徐直方除右正言大元國兵破饒州守臣唐震為兵所害死於州治之玉芝堂前丞相江萬里寄居饒州州人皆遁萬里坐守以為民望兵入其第赴水而死萬頃自南康來省兄遇兵不屈遂以磔死破池州趙昻發蜀人以倅權守兵至與妻子訣其妻曰爾能盡忠吾獨不能為忠臣之婦乎寧相從於地下昻發大喜具冠裳大書十六字於倅㕔春臺上曰君不可負臣不可降夫妻俱死節義成雙遂俱縊而死學有二士哭其尸曰生為大宋人死為大宋鬼何以洗此汚清溪一泓水明日巴延丞相領兵入城見而憐之具衣衾葬焉乘勝順流至瓜州揚州都統姜才大戰楊子橋勝負相乘生兵益增遂退師入太平州守臣趙之縉遁入建康府沿江制置趙縉遁察院潘文卿劾縉取行宫公帑金帛棄城建康為江東重鎮則江東之勢去矣大兵至建康不進遣哨騎四出趙淮趙葵子也起兵溧陽兵敗不降死之張世傑率舟師趍金山約殿帥張彥竟不出世傑海舟無風不能動大元國兵水哨馬往來如飛世傑孤軍無援戰敗人艘皆沒哀哉入鎮江府守臣洪起畏遁統制石祖忠以城降入寧國府守臣趙與可遁言者謂與可為宋臣望風奔遁除名勒停以為不守封疆之戒下徽州韓震議遷都先是賈似道奏請遷都太皇太后不許及韓震復申前議左丞相王鑰議堅蹕未決求罷不允徑去宗學上書言陛下移蹕不於慶元則於平江事勢危急則航海幸閩不思我能往彼亦能往縱使兵或可守豈能鬱鬱求活於一龜兹國耶三十日夜右丞相章鑑遁三月壬申韓震謀遁遷蹕隂懷異志宜中與客潘希聖議請計事伏甲士擊之以步軍指揮使領其衆震部曲百餘人大閧而出射火箭入大內斫嘉㑹門宜中遣兵逐之奔建康府大元國兵至常州守臣趙汝鑒遁鈐轄戴之泰同士人王良臣以城降前誤書曰常州守臣王宗洙遁今依奉上司行下備據常州路儒學勘當王宗洙先於亡宋咸淳年間為守癸酉年十二月解任代官趙汝鑒於至元十三年大軍臨城之時逃匿以州印付戴之泰同士人王良臣迎降其時王宗洙充大府寺簿續除兵部郎官奉使福建即非王宗洙在任再行移常州路保勘相同今依上改正知江隂軍趙䇕道遁知廣德軍令狐降京師戒嚴朝臣接踵宵遁人情洶洶知臨安府曽淵子兩浙運副浙東提舉王霖龍機政文及翁倪普臺諫潘文卿季可陳過徐卿孫侍從以下陳堅何夢桂曽希顔等數十人並遁朝中為之空疏朝堂榜云我朝三百餘年待士大夫以禮吾與嗣君遭家多難爾小大臣未嘗有出一言以救國者吾何負於汝哉今內而庶僚畔官離次外而守令委印棄城耳目之司既不能為吾糾擊二三執政又不能倡率羣工方且表裏合謀接踵宵遁平日讀聖賢書自諉謂何乃於此時作此舉措或偷生田里何面目對人言語他日死亦何以見先帝天命未改國法尚在可令尚書省别具在朝文武官並與特轉二資其負國弃豫者令御史臺覺察以聞具榜朝堂明吾之意癸酉陳宜中奏罷浙西公田給還元主甲戍賈似道罷平章都督豫祠似道遣翁應龍護都督印歸朝上表自劾太后有㫖令淮東帥李庭芝律遣賈似道歸里終喪似道留維揚不行王鑰奏似道既不成忠又不死孝乞下切責太后降詔略云卿亟其歸喪次以盡臣子之道當曲豫保全否則衆論益甚忠孝靡容吾雖欲屈法伸恩而不可得卿其明聽吾言善始以終亦有辭於永世六月似道歸紹興府紹興府閉城不納七月王爚奏乞正似道罪臺臣交章言似道喪師誤國之罪乞追竄嶺南方回言似道幸詐貪淫𥚹驕吝專忍繆十罪乞賜死乃降三官婺州居住廖瑩中王廷除名勒停韶州羈管王廷曽淵子並竄雷州言者不已似道改送建寧居住翁合奏似道以妒賢無比之林甫輒自托於伊周以不學無術之霍光敢效尤於莽操其總權罔上賣國召兵專利虐民滔天之罪人人能言臺諫交章乞行逺竄迫於衆怒僅謫建寧切惟建寧實朱熹講道之闕里雖三尺童子粗知向方聞似道且嘔惡唾去况可見其面如熹釋大學一章曰放惡不逺彼且稔惡所伏之地其民何罪必以禦魑魅而後已夫與之同中國且不可而可一日與之同此鄉必放之此鄉此鄉亦獨何罪巷伯惡惡之詩曰投畀有北有北不受而終曰投畀有昊蓋有北決所不受則付與昊天惟天得制短長六合爾此則陛下事乞將似道逺竄閩廣以伸國法以謝公論有㫖責授高州團練副使漳州居住下臨安台州簿録其家似道寓建之開元寺欲俟秋深入南朝廷遣鄭虎臣監押至則拘似道行李制其出入節其飲食凌辱百端似道不勝其苦舟次南劔黯淡灘虎臣曰水清甚何不死於此曰太皇許我以不死候有詔即死冬十月至漳州木綿庵虎臣悉拘其子與妾於别館即厠上拉其胸殺之殯於庵側辛巳張世傑入衛京師內空賴張世傑一軍萬人自荆湖至世傑本信安歸正人權承宣使宜中疑世傑易其所部之軍世傑不得以盡其力陳宜中拜右相似道出督以宜中受卵翼之恩且柔順易制委以國賈敗宜中首劾賈罪以自解拜右丞相宜中當國首誅韓震脅遷之議差强人意然書生不知兵張世傑步將也使提舟師劉師勇水軍將也使提步卒用非其才卒致誤國大元國兵至平江府守臣潜越友遁通判胡玉以城降至安吉州守臣趙與立降江上列城或降或遁無一人堅守四月王爚平章軍國重事性剛介似道當國獨不阿附再召入朝纍疏乞正賈罪其他無所建明八月力請致仕尋卒陳宜中都督軍馬奉㫖建督于京檄召諸路軍馬勤王并令潰軍各歸所部淮東𨽻李庭芝淮西𨽻夏貴沿江𨽻汪立信京湖四川𨽻朱祀孫江西𨽻黃萬石節制團結內外兵十七萬五千人分廂差寄居官為總督給一兵赴教場教閲司馬夢求監江陵沙市鎮鎮在江濵江陵之外城也夢求請築沙市城北兵次沙市鎮統領程文亮降夢求戰死夢求漢州人溫公五世孫也大元國兵至江陵府高達以城降高達京湖名將也己未解圍鄂州似道許以建節後竟不與達怨望久矣至是為京湖制置遂降宣閫不能制城初陷朱祀孫仰藥不得死既而亦降焉乃令朱祀孫移文諸路歸附鼎州灃州常得府壽昌軍並下至湖南圍潭州安撫李芾與大兵戰于醴陵得捷守城攻之不克五月太皇太后詔諭吕文煥等轉達軍前息兵通好張彥劉師勇復常州王良臣敗走復廣德軍徴諸帥入衛夏貴咱萬壽黃萬石並不至吕文福先於四月間請提兵入衛行人失辭文福自疑亦不至有司議建藩屏以强王室詔以福王與苪判紹興府浙東安撫大使置長史司馬六月庚申朔日有食之既是時天地晦𡨕咫尺不辨人雞鶩歸儼如暮夜自已至午其明始復太皇太后下詔求言去聖福二字用昭戒謹恐懼之意陳宜中左丞相劉夢炎右丞相陳文龍黃鏞僉書樞密院事謝堂鎮撫使家鉉翁知臨安府文天祥刑部尚書趣赴行在夏貴淮東制置知揚州朱煥淮西制置知廬州召李庭芝赴行在夏貴不受代李庭芝閉門自守九月明堂文天祥入衛先是四月間天祥募兵於贛州天祥時為江西提刑台州杜滸將吉贛千人從之至是將民兵及峒丁二萬人至京衣裝器械盡具時宜中去位夢炎獨相意不相樂乃以天祥守吳門除江浙制置使知平江府張濡守獨松關殺萬户希賢大元用我叛將王良臣以兵攻常州知府姚訔統制劉師勇王安節守城不克十月常州告急文天祥遣將尹玉朱華張全麻士龍赴援戰于五木敗績張全不發一矢尹玉麻士龍死之尹玉江西將也與良臣戰殺數千人復收殘兵五百與北兵相持又一夕手殺七八十人遂死麾下無一肯降朝廷贈濠州團練使廟食贛州官其二子常州不下士良役城外居民運土築堡土至併人填陷其中又殺常州之民數百人煎膏取油作炮擲於牌杈上以火箭射之其火自發十一月常州糧盡劉師勇以八騎突圍出奔平江遂破常州屠其城知州姚訔死之生獲將軍王安節不屈而死嵩乃姚希得之子安節乃節度使王堅之子十月陳宜中再相團結京城民丁及招年十五以上者為軍號武宣軍長不滿四尺觀者寒心宜中本無經綸之才八月以母老為辭竟回永嘉忠孝之誼兩無所據九月詔趣入朝至是國事已去不可為矣家鉉翁同簽書樞密院事謝堂知臨安府賜太學生張景忠等並出身瑞州先下遣姚計議來隆興說降劉槃拒之十一月壬午大元國兵至隆興府劉槃引兵出城纍戰不利乃以城降下撫州時制置黃萬石開閫撫州聞兵至遁入閩都統密佑迎敵就擒嚼舌罵聲不絶而死施至道以城降建昌相繼而下破廣德軍攻平江府通判王矩之以城降至桐關去杭百里我師敗績獨松關告急召文天祥入衛天祥自吳門還遣守獨松關時天祥軍三萬張世傑五萬諸路勤王猶有四十餘萬天祥與世傑密議今兩淮堅壁閩廣全城王師與之血戰萬一得捷則罄兩淮之兵以截其後國事猶可為也世傑大喜遂議出師獨宜中沮之曰太皇降詔以王師務宜持重為說遂止十二月大元巴延丞相領兵屯平江進屯長堰宜中遣使議和見巴延于長堰已而不如約故大兵徑至高亭山宜中蒙蔽外庭而三宫若罔聞知遣使納降表直學士高應松乃以京局官劉褒然直學士院草之自似道喪師後至今十餘月國事危急將士離心兵出屢衄朝廷方且理㑹科場明堂等事士大夫陳乞差遣士人覬覦恩例一籌不畫及是束手無措乃議納土求封為小國賫降表奉使燕京哀哉詔文天祥罷兵太皇詔南北講和京城內外民兵罷團結栁諤奉降表至高郵軍嵇家莊為嵇聳所殺丙子德祐二年正月謝堂僉書樞密院事文天祥浙西制置知臨安府十二日秀王與擇奉皇兄廣王是皇弟益王昺出宫航海張世傑欲護駕入海乃去朝大元丞相巴延領兵進臯亭山去城三十里北使請執政軍前議事文天祥請行陳宜中夜遁十九日除文天祥右丞相兼樞密院天祥辭不拜乃以賈餘慶為右丞相吳堅為左丞相謝堂樞密院家鉉翁參知政事劉岊同知樞密院事侍從交贊公出天祥曰國事至此吾不得愛身翊日以資政殿大學士行至高亭山見巴延丞相天祥抗辭慷慨議論不屈遂留之不使歸南北兵進屯北關門外吕文煥范文虎九騎入城謁太皇太后是月鎮巢軍曹旺無為軍劉權並降二十日巴延丞相入臨安府請太皇太后降令太皇降詔江南諸郡歸附各郡付一省劄吳堅一如賈餘慶之命惟家鉉翁不書名程雄飛作色欲縳鉉翁鉉翁叱曰中書無縳執政之理遂止遣使祈請朝廷自十二月至二月信使往來和議未決北使請宰執親往燕京朝覲乃以吳堅賈餘慶謝堂家鉉翁劉岊五人詣大都為祈請使二月初九日賈餘慶等登舟是日吳堅出北關門外送諸使登舟時傳巴延丞相命留吳相登舟偕行是日㑹文天祥於軍前詞氣益壯初十謝堂納賂還十一文天祥自北寨登舟同特穆爾萬户至二十九日舟次鎮江文天祥乘間逸去三月初一日早方知文丞相脫閉城三日索之不見收從人幹僕并所差館伴者囚之閏三月初十日至燕京宿㑹同館十四日賈餘慶薨二月丙申朔巴延丞相傳㫖收城軍器北使請傳國璽以監察御史楊應奎宗臣趙若秀為押璽使丁未索宫女內侍樂官諸色人等宫人守節而死者甚衆乙卯北使請三宫北遷丁巳宋少帝全太后出宫太皇太后以疾留大內隆國夫人黃氏朱美人王夫人以下百餘人從行福王與芮參政謝堂高應枀駙馬都尉楊鎮臺諫阮登炳鄒珙陳秀伯知臨安府翁仲德等以下數千人大學宗學生數百人皆在遣中二宫過真州苗再成奪駕幾奪去閏三月二十四日至燕京吳堅等出迎居㑹同館四月乙丑朔吳堅等先赴上都十五三宫赴上都丁巳沂王薨五月丙申見大元皇帝於行宫焉太皇太后卧病主者自宫中舁其牀以出衛者七十人從行八月乃行降封為壽春郡夫人至燕七年而崩全皇后為尼於正智寺少帝降封瀛國公臨江軍陷權守滕巖瞻遁潭州陷李芾守潭竭力備禦凡八九月其間出戰屢捷而大兵之攻日增芾不能支是嵗正月城破芾命積薪樓下於是攜家人盡登樓大宴積金銀於兩畔芾與館客坐中其餘列坐左右酒半酣命喚二劊子來既至則令將此金銀去與你家口取法刀來一不肯受一㑹意徑受之攜去分付家人畢須㬰將法刀至芾呼之至前分付先從頭殺入到尾殺我待我㸃頭時下手復飲酒良久㸃頭惟館賔與一妾墜樓而走妾折一足最後李帥伸頸受刃此劊子遂四面放火自刳其腹而死從死者七十餘人劊子姓沈名忠亦可謂烈丈夫矣尹榖潭州人除知衡州未之任潭州陷自火其廬舉家赴火死宋都木達元帥至吉州權守周天驥以城降循浙東至嚴州知州方回降至處州知州梁信降衢婺等州並下夏貴馳入燕京獻淮西諸郡貴既失長江惟恐督府有成罪無所逃又恐孫虎臣以後進為將有功總統出已上日夜幸其敗覆督府既潰貴歸廬州不出朝廷屢詔不出若罔聞知國亡乃以淮西全境歸附為己功焉李庭芝守揚州廣王登極除庭芝為右相棄揚州引兵輕出至泰州欲航海至海州大兵追及阿珠元帥斬于軍前朱煥以揚州城獻姜才死之才淮之猛將前後出師屢收大功乙亥春戰于瓜州不利丙子二月太皇差吳忠翊孫通直領北兵數千至揚州行至揚子橋炮聲連發繼至城下一炮震天城上旌旗雲擁軍馬屯集放剗車弩箭如雨再一炮響雲氣四合冷風大作驟雨隨至遂回三月三日三宫過揚州才統軍數千奪駕繼以兵馬相詎而退初四日才出揚州北門領兵擁出分陳殺奪交傷不少博囉相公親臨陳大戰方退才意欲奪駕不知乃諸將之過北也至八月大軍圍揚州大戰之日才身生九疽不可掛甲遂敗被執臨刑含血罵聲不絶而死苗再成守真州部將有趙孟錦者為將領北軍攻真州每戰輒先士卒苗再成倚之嘗乘大霧襲北營霧解北軍見其軍少逐之登舟失足墮水中甲重遂溺城破再成死之泰州陷孫虎臣弟良臣降虎臣死之通州相繼而陷建德府陷方回降大元改臨安府為杭州宋季三朝政要卷五
