body:
  text: 宋季三朝政要卷一理宗乙酉寳慶元年春正月壬戌朔詔舉賢良上初即位與楊太后垂簾同聽政上曰傅伯成皆先朝耆舊朕所簡記可召赴行在尋除寳學奉朝請潘壬潘丙謀立濟王遺書李全約以二月朢日舉事為邏卒得其人并書以白彌逺彌逺改作三月且許行人以美官重賞令其以書達全至二月潘壬潘丙率太湖亡命數十人各以紅半袖為號乗夜踰城而入至邸索王言推戴意王聞變易敝衣匿水竇中久而得王擁至州治以黄袍加身王號泣不從不獲已與之約曰汝能勿傷太后官家乎衆許諾遂發軍資庫金帛楮券犒軍命守臣謝周卿率見任寄居官入賀而揭李全牓于州門言史彌逺廢立等罪且稱見率精兵二十萬水陸並進人皆聳動以為山東狡謀比曉王視其士卒則太湖漁人巡尉司弓卒而已王知其謀不成乃與郡將州兵戰之其數元不滿百也王元春以輕舟告變于朝史彌逺急召殿司將彭任赴之兵至而事已平矣乃班師時全守淮安知所約失時遂叛歸北彌逺謀害濟王遣其客秦天錫來且頒宣醫視疾之命時王本無疾天錫諭上意逼王就死遂縊于州治尋下詔貶王為巴陵郡公其後魏了翁真徳秀洪咨夔潘枋相繼上疏咸言其寃大理評事胡夢昱應詔上書言濟王不當廢引用晉太子申生漢戾太子及秦王廷美之事凡百餘言訐直無忌彌逺怒竄夢昱于象州紹定壬辰沛恩宥過夢昱已死贈朝奉諡剛簡仍官其子詔取士先器識夏真徳秀上殿奏事勸上容受直言祈天永命用賢臣結人心為自立根本又言三綱五常者扶持宇宙之棟榦奠安生民之柱石人而無此冠裳而禽犢矣國而無此中夏而裔夷矣晉廢三綱而劉石之變興唐廢三綱而羯胡之難作我朝立國根本仁義先正名臣或以為家法最善或以為大綱甚正陛下初膺大寳不幸處人倫之變有所未盡流聞四方所損非淺霅川之變非濟邸本志前有避匿之迹後聞捕討之謀情狀灼然本末可攷願詔有司討論雍熙追封秦邸舍罪卹孤故事斟酌而行之雖濟王未有子息興滅繼絶在陛下爾上曰朝廷待濟王可謂至矣徳秀又奏陛下友愛之心可謂無所不至但謂此事處置盡善臣未敢仰承聖訓觀舜所以處象則陛下不及舜明甚大底人主當以二帝三王為師秦漢而下人君舉動不皆合理難以為法上曰亦是一時倉猝徳秀又奏此已往之咎臣所以奏者欲陛下益進徳修學以掩前失二乞收人心略曰太平興國中秦邸事作太子太師王溥等議于朝堂者七十有四人然後有詔裁決以大事不可輕也康定慶厯間求西帥必取當世第一流宰相吕夷簡至忘讎薦進以重任不可輕也往者霅川之獄未聞有參聽于槐棘之下者又如淮蜀二閫之除皆出僉論所期之外天下之事非一家之私何惜不與衆共此收人心之一事也賞罰適平則人莫得而議今有功罪同而賞罰異者朝廷之於天下當如天地之於萬物栽培傾覆付之無心可使一毫私意於其間哉此收人心之二事也當乾淳間有位于朝以饋遺及門為恥受任于外以苞苴入都為羞今薰染成風恬不之怪果欲息天下之謗莫若反其物罪其人則心迹暴白此收人心之三事也治世氣象欲其寛裕不欲其迫蹙曩者以訛言之籍籍有譏呵之令焉譏呵則已過矣甚至於流竄焉殺戮焉都城之民摇手相戒宜解密網達下情此收人心之四事也三言朝廷之上敏銳之士多於老成政事之才富於經術雖嘗以耆艾褒傳伯成楊簡以儒學褒柴中行以恬退用趙蕃劉宰然前之三臣止加異數未聞聘召至於亮直敢言如陳宓徐僑皆未蒙記録願處伯成簡於内詞置中行於經幄擢宓僑於言地徳秀又奏華髮舊徳之臣不獨人主賴其益朝列新進之士亦有所矜式伯成簡皆年踰八十縱使召之不至必能因囊封以進忠言又奏長人之官拊字不聞叨懫日甚上曰如何無一亷者又問何以革之徳秀奏此在朝廷用舍黜陟之間示人以意上又問卿曽見有何亷吏徳秀以袁守趙䈣夫對御筆擢䈣夫直祕閣與監司差遣徳秀手劄謝上因言崔與之帥蜀楊長孺帥閩皆有亷聲臣一時不能悉數以對乞廣加咨訪始徳秀在道猶未聞濟邸之計以書達時相謂必有寡聞淺見之人托納忠除患之說以誤朝廷者不可不致察時相既惡聞其語至范村使左史楊邁來見問所欲言又遣所親諭以勿及甲申之事徳秀但唯唯洎入國門都人聚觀皆以手加額益見忌矣辭内制者四從之寧考小祥詔羣臣服純吉真徳秀言自漢文短喪至我阜陵獨出宸斷衰服三年阜陵上賔羅點建議乞令羣臣易日之後朝㑹權用公服黑帶朔朢奉慰皆衰服行事大祥始除光宗之喪復以小祥從吉後易以升袝紹興易以小祥甲寅易以大祥二百餘年之間其制四變皆由近而之逺非自逺而之近也侂胄變甲寅之制是自逺而之近自厚而之薄可乎哉上即詔行在職事官候大祥從吉諸路依已降行五月趙范趙葵全子才用降人谷用安之言欲乗時撫定中原建守河據闗之議以聞于朝乃命趙范開閫於光黄之間杜杲力陳出師之害大略曰權衡於和戰之間無己則及守之一策蓋明深溝高壘之謂守非清野閉關謂之守也又策自治有備無患俟時而動之謂守也選擇將材揀練軍實積蓄糧食廣備舟車修全器械愛養民力懐來北人示以恩信顧吾之力已全吾之氣已盛以之而戰長驅萬里兵不留行以之而和行李一通請盟不暇臣備貟邊臣切見沿淮旱蝗連嵗薄收加以調遣無度輦運不時生聚蕭條難任征役中原版蕩多年不耕無糧可因千里餽餫師不宿飽若虛内以事外移南以實北腹心之地豈不可慮時在外諫北伐者惟公一人及師衂洛陽退師保境兵釁遂開始服公先見六月全子才合淮西兵萬餘人赴汴以十二日離合肥七月二日抵東京詎城二十里駐兵五日整兵入城行省李伯淵先期以書來降願與谷用安范用吉等結約乃殺所立崔立率父老來降先是黄河南舊有寸金淀乃為金人所決河水淫溢自壽至汴水深並腰行役良苦子才駐汴以俟糧嵩之不肯運糧卒致誤事南滁州路鈴樊卒路分王以偏師下鄭州己卯趙葵以淮西兵五萬取泗州由泗至汴與子才軍會因謂子才曰我輩始謀據闗守河今已抵汴半月不急攻洛陽潼闗何待耶子才以糧餉未集對趙葵益督趣之遂檄范用吉樊卒李先胡顯等提軍一萬三千人命淮西帥機徐敏子為監軍先令西上且命楊誼以廬州强勇軍一萬五千繼之各給五日糧諸軍以糧少為辭庚辰敏子啓行乙酉遣和州寧淮軍正將張迪以二百人據洛陽至夜踰城而入城中寂然無應者蓋北軍戍洛陽者皆空其城而誘我矣及晚有民庶三百餘家登城投降迪等遂入洛陽次日軍食已竭乃采蒿和麪作餅而食之楊義至洛東三十里方散坐蓐食忽數百步外有立紅黄凉繖者衆方駭異而伏兵突起深蒿中義倉猝無備大潰擁入洛水者甚衆義僅以身免是晩有潰軍奔迸而至云楊義一軍已為金人大陣衝散今北兵已據北岸矣於是在洛之師聞而奪氣八月一日北軍已有近城下寨者敏子與戰勝負半之士卒乏糧遂殺馬而食望糧不至遂班師改湖州為安吉州丙戌寳慶二年春詔長吏勸農桑親饗給犒軍士詔増價招糴詔州縣舉遺逸之士補陳均陳文蔚官戒州縣毋得苛取於民贓吏經赦不許改正戒飭省闈精考擇上試進士賜王㑹龍等及第出身有差詔作新士風梁成大劾真徳秀降三官初彌逺欲去魏了翁真徳秀諭意有人敢言真徳秀者即除察院無人忍言之適梁成大參部聞之日坐茶肆中毀真公不直一錢或以告彌逺彌逺喜遂擢用之自小邑令除察院首劾真徳秀尋以成大守建寧毁其所建宏詞坊可以捃摭者無所不至遂獵取禁從為彌逺鷹犬嘗貽書所親曰真徳秀乃真小人魏了翁乃偽君子此舉大快公論中外籍籍目之為梁成犬識者非之魏了翁貶靖州六年閉户讀書自如也丁亥寳慶三年春正月詔州縣勸農桑朱熹贈太師追封信國公雪寒上命出米以濟飢民賑濟畿甸水灾洪咨夔召為禮部郎官尋除監察御史升殿中侍御史彈監察御史王定定左遷夔已出臺改中書舍人王定者附史彌逺為右司郎官嘗忤胡夢昱為怪敢死者在臺與公異論公惡其奸衺故彈去之朝野驚歎咨夔除端明學士薨于位救荒宜令有司申明遏米之禁明堂詔省郊祀費韃兵破闗外四川制置鄭損棄三闗不守戊子紹定元年春正月詔諸州貢舉以得士為先太白經天雨雹知潭州曽從龍置惠民倉嚴飭和糴官吏上命儒臣日侍經筵講經湖南江西福建盜起申嚴舉主舉人才悔舉法韃靼國兵長驅而南金自宣宗時凡大河以北東至于山東西至于闗陜不一二年䧟沒殆盡金人併力守黄河保潼闗自黄河洛陽三門析津東至邳州之源雀鎮東西長二千餘里差四行院分地界守禦精兵不下二十萬民兵不在其數如是者十有五年金人不勝其擾朝廷議諸帥謹邊備上然之己丑紹定二年春以程珌等知貢舉上親試舉人賜黄朴以下及第出身有差申嚴斛面之禁台州水給諸軍薪炭錢申明太學舍法度正奏節儉事贓論人經郊方許到部參注禁苞苴干請詔民間二税依時過割稅賦不許抑令折納汀郡冦發陳鞾平之晏頭陀夢彪嘯聚汀郡境上殘破寧化清流將樂諸邑迫南劔帥府請于朝謂非陳鞾莫破此賊時鞾丁父憂詔起復知南劔州鞾至州籍峽常民兵申乞調淮西精兵五千人救援淮西制置曽式中遣將陳萬以三千五百人來朝廷遂除鞾提刑招捕使擊破潭飛磜諭降蓮城七十二寨賊潰夢彪降誅之諭鄭損防遏海道桂如琥奏屯回庚寅紹定三年春正月詔勸農桑令有司興水利三月丁酉雨土行在㑹子庫置監官覈實二廣丁錢四川旱命州縣賑卹減圍田稅招瀕海漁業人充水軍慈明殿出緡錢犒諸軍卲武冦犯建寧府劉純擊敗之蠲被盜州縣租税一半江西瑞州禾稼秀而不實民間乏食九月信國公朱熹改封徽國公明堂上飲宴過度史彌逺卧病中時人譏之曰隂陽眠燮理天地醉經綸辛卯紹定四年春二月詔録學術深邃之賢李全平先是京東忠義軍都統制季先者亦歸朝入為樞密都統制史彌逺以事誅之李全懼有異志使其弟李平潛為諜於都堂朝議以文臣不知兵選武臣制之乃以許國換授太府卿楊州制置使移司楚州既至全入謁因與客杜來議進見之禮來曰彼狼子野心宜責其横挺庭參全怒殺許國屠其家國被執窘曰杜來敎我乃以藁束來而生爇之遂叛後全圍揚州時趙葵守城因元宵放燈全移營灣頭亦放燈趙葵掛榜城曰許百騎入城觀燈聞李全喜著白袍一夕八十騎皆皂袍遊城出去一夕百騎皆紅袍又次夕百騎皆白袍葵設伏閉城盡殺之至第三年修城見金甲一帶方知全死於此韃靼自山東通好欲假淮東以趍河南羣臣議不許度正奏韃靼兵入蜀詔諸州守臣嚴守備兵退曲赦四川軍民襄帥陳垓奏韃靼國遣使約夾攻金詔羣臣議追毁趙汝驟出身文字真徳秀以慶壽恩復寳謨閣待制飭州縣科糴之弊秋成覈實災傷蠲減蠲紹興被水民户折麥都城大火延燒太廟三省六部御史臺祕書玉牒所詔求言藉田令徐清叟上疏乞為濟王立後其略曰巴陵有過罔克繼綂陛下手足之愛可謂甚至不幸狂冦猝發陷巴陵於不義服御僣擬死有餘罪然在彼縱非在我不容不厚奪爵廢祀暫焉猶可久而不赦厥罰為甚今火延太室由陛下一念之愠忍加同氣傷和召異疏上不報辛卯之火比辛酉之火加五分之二雖太廟亦不免惟史丞相府獨存洪舜俞有詩云殿前將軍猛如虎救得汾陽令公府祖宗神靈飛上天可憐九廟成焦土時殿帥乃馮榯也人言藉藉迄不免責壬辰紹定五年春詔知舉陳貴誼等先器識後詞藻二月太白經天廷試定在四月上親試舉人賜徐元杰以下及第出身有差隂雨出米紓民食蠲竹木之征三月詔諸路監司減放旱歉陳貴誼乞革文弊國兵與韃靼國兵合圍汴京金義宗自汴京突圍出奔歸徳府李日邁乞詔舉亷去貪赦盱眙改為招信軍韃靼國遣使來議夾攻金人史嵩之以鄒伸之奉使草地報聘北朝伸之曰本朝與貴國素無讎隙寧宗嘗遣使臣荀夢玉通和自後山東為李全所據河南又被殘金所隔貴國今上順天心下順人心遣王宣撫來通好所以伸之等前來北朝從之仍許以河南歸本國癸巳紹定六年詔抑貪競李日邁乞詔諸道隨有無勸分置寨松江口防海道戒飭坑冶司納新錢毋許截錢納券二廣敷鹽之害六月金主歸徳絶糧奔蔡州金主自發歸徳連日暴雨平地水數尺軍士漂沒甚衆及蔡始晴復數月大旱識者以為不祥趙葵乞經理營田趙至道奏民間賦稅宜選擇鄉司以革産錢飛走之弊賜史宇之宅之出身秤提見鏹流通十月史彌逺死彌逺開禧丁卯為禮部侍郎白楊太后誅侂胄事甚秘侂胄死而寧宗不知居數日上顧問侂胄安在否左右乃以實對上深悼之彌逺為相十七年寧宗崩廢濟王立理宗又獨相九年用余天錫梁成大李知孝等列布于朝最用事者薛極胡榘聶子述趙汝述時號四木彌逺出入禁苑擅權用事臺諫争言其非上思其功不忘復進其姪嵩之史嵩之為京湖制置使置司襄陽十一月遣襄陽太尉江海襄陽帥孟珙以兵四萬人至蔡州滅金兵駐城南帥臣史嵩之運糧十萬給南北軍甲午端平元年春正月改元詔曰春秋正王道之端式嚴謹始聖徳開太平之路尤貴更新元旦詔求言舉賢十一月孟珙兵先薄蔡州城下時韃靼國兵未至珙攻城甚急金主知城必破乃傳位後主閉閣自縊後主為亂軍所害鄭清之除左相喬行簡除右相收召人才如真徳秀魏了翁諸賢時論以端平比之元祐優恤兩淮運米人夫賑恤三京降附夏除真徳秀吏部尚書史嵩之上露布以八陵圖守緒骨函及參政張天綱都尉完顔好海玉帶金銀牌等來獻除知樞密院事都督軍馬嵩之奏乞經理四京有詔集議真徳秀洪咨夔趙履常等争之惟鄭相主其說洪咨夔奏金亡而有興者高奎奏邊事四幸四慮詔集議和戰攻守趙汝洌奏黄州六闗詔嵗除主師主兵官揀汰諸軍諸路黥𨽻人押赴淮襄充軍趙立夫奏和糴利病禁銅錢下海袁甫奏蠲漳泉興化丁錢詔李心傳修國朝㑹要詔措置楮幣秋除真徳秀翰林學士知制誥兼侍讀魏了翁除禮部尚書兼侍讀尋除端明同簽書樞密院督視京湖軍馬出内帑緡錢兑易却歸正蕃臣獻馬蠲放仁和地稅冬以趙范為荆湖制置使鎮襄陽九月真徳秀進對上曰卿去國十年每切思賢時襄門代去江淮出師取三京王師果潰于洛陽退守泗州公奏三劄一言今中原無主政是上天鑒觀四方為民擇主之時若能修徳格天必命陛下為中原之主不然則天命將歸之他人臣向為先帝陳祈天永命之戒其說出於召公然反覆召誥一篇綱目曰敬徳曰小民而已傳曰敬者徳之聚儀狄之酒南威之色盤游弋射之娛禽獸狗馬之玩有一於此皆足害敬其可不戒此祈天永命之一也天之視聴因民視聴民心之向背即天心之向背權臣之末貨賂公行誅求既廣民不堪命大盜相挺而起賴陛下布端平之詔一洗而新之然窒賄道而賄進者尚存懲贓吏而贓多者漏網江淮軍興調度騷然宜戒郡縣掊克停邊閫科調此祈天永命之二也易曰天之所助者順人之所助者信天厭夷徳久矣陛下倘能敬徳以迓續休命中原終為吾有若徒以力求之而不反其本天意難測臣實憂之二言進取有二難用兵莫急於人才今舉世所屬曽不數人一難也臣嘉定中嘗乞經理兩淮墾田積榖而權臣視以迂濶塞下之備枵然一旦舉兵乃漕浙米由江入淮汴既久湮又須陸運勞費甚於登天二難也夫此二難皆權臣玩愒之罪非今日措置之失然承三十年之弊欲整治之非十年不能此正諸葛亮閉闗息民之時也願以收歛靠實為主又言今日事勢猶以和扁繼庸醫作壞之後一藥之誤代為庸醫受責矣兢業戒謹尤當百倍三言戰守之論不同同於為國元祐中廩廩向治惟羣賢自相矛盾小人得以乗之願平心商𣙜以前事為戒上輒稱善又言士大夫紐於舊習上曰往往革面而未革心乞選監司郡守上曰聞卿所至視民如子朕甚嘉之徳秀又言恢復名義甚正但故相不曽做得工夫上曰昨讀卿所上封事可見忠誠魏了翁奏劄曰陛下以聖智之資而為權臣所據者十年幾無以自白於天下今幸居可為之時外而百官奔走效職内而嬙御便嬖取怜或者視之必曰今乃知為皇帝之貴也今天下太平及時為樂也臣以古今禍福觀之則陛下雖曰勢重形佚其實巍然孤立居至艱至危之地而不自覺也陛下試思之獨居深宫之中可托者誰歟當事變遝來之時可以係天下之重者誰歟詩曰价人維藩大師維垣大邦維屏大宗維翰懷徳維寧宗子維城此六者守邦之要道也又曰天下者祖宗之天下也今日之疆事天下之存亡係焉陛下其忍以祖宗天下存亡之機而付之二三邊臣聴其自為而略不加之意乎其忍以私恩意而用之私情囑而比之乎今秋防正急鹵莽特甚事闗國家日夜痛心若一敗塗地而歸罪於儒生之誤國雖身膏鈇鉞死無所益是以及今􅈤􅈤言之必望聖慈見之施行不然臣之言未肯已也兵威所加凶醜言服則有之矣今敗於彭城而李全降敗於朐山而胡義降此豈人情也哉儒生與戚宦不兩立而用儒受言與聲音酒色亦異途此重則彼輕勢使然也及督視京湖又曰臣仰體國家之急不待文檄星馳就道既而祈請錢物辟置屬官皆不能盡如初意臣之處此進退維谷矧又有難於此者乎竊意廟堂之上必以廬黄賊酋多斃賊未退而荆襄淮西之事方棘也今已赤地千里往往行十日無炊煙以千卒倀倀乎舒蘄之南窮日之力奔持六十里未明而行或憑鼓而閱儆報一夜就寢或推枕而行文移猶慮其不及何也真徳秀進大學衍義其書首之以帝王為治之序次之以帝王為學之本莫不自心身始也此所謂綱也首之以明道術辨人才審治體察民情者格物致知之要也次之以崇敬畏戒逸欲者誠意正心之要也又次之以謹言行正威儀者脩身之要也又次之以重妃匹嚴内治定國本敎戚屬者齊家之要也此所謂目也首之以聖賢之訓典次之以古今之事迹人君所當知之理所當為之事粗見於此凡四十三卷次日後殿聚講上曰卿所進大學衍義一書有補治道朕朝夕觀覽後徳秀輪當進讀大學章句畢上諭卿所進大學衍義便合就今日進讀蒙國使人入朝乙未端平二年春以真徳秀知貢舉天狗星墜淮安軍金棠縣其聲如雷三州之人皆聞之及相與觀則化為碎石其色紅或者以為兵戈之兆三月以真徳秀參知政事以疾辭除資政大學士提舉萬壽宫徳秀奏請息民講武上嘉納之未數日薨諡文忠安南國進方物四月上試進士賜吳叔告等及第出身有差詔邊臣警備臣寮奏乞以保蜀為念五月唐州守楊侁至襄陽禀議因言本州綂制郭勝有異志趙范先置勘院將召郭勝以鞫之㑹蔣應分司唐州以泄其事郭閉城率衆射死侁於凉蕎中且密遣人求北援反報至襄趙范乃命忠衛都綂江海領兵號二萬又命隨州守臣全子才節制諸項軍馬攝棗陽軍劉子澄策應趙楷監軍三人皆以西師之敗咸願自奮七月三日北兵至唐州棗林子才子澄聞之而遁十一月北兵至襄陽約六七千人下寨于桓溪山趙范出師戰于上閘口余哲軍敗喪數千人再戰勝之北兵退乃班師臨安軍民交閧俞元廙奏軍無紀律詔閧卒並依軍制詔集議楮幣出度牒收兩界㑹子節用以秤提楮價詔行覆試法陳均進長編綱目遣使蒙古國丙申端平三年春正月詔勸農桑蠲興國軍秤尺牙税錢賜安南國王封爵襲衣金帶駁放豪民出身楮幣宜造十八界降黄榜措置㑹子賑昭州英徳府水賑襄漢水詔蠲被水州郡稅明堂行禮之夕大雨震電人以為燮理非人之咎鄭清之喬行簡並罷相尋有㫖留行簡侍經筵冬再相進平章軍國重事封益國公行簡清直有人望薨于位十二月韃靼國兵入普州順慶潼川府破成都府掠眉州一月五十四州俱陷破獨夔州一路及瀘果合數州僅存蜀將曹友聞死蜀破而淮甸有警王瓚奏備邊之計孟珙任四川宣撫使兼京湖制帥創南陽書院以處襄漢流寓之士竹林書院以處四川流寓之士射軍中而亦讀書頗能文尤多著述丁酉嘉熙元年詔趙葵措置邊事開邊後下詔悔過詔沿邊帥守議和戰攻守之策詔安集淮蜀京襄給犒㳂邊將士詔國子監刋文公通鑑綱目許應龍除端明殿大學士簽書樞密院事六月行都大火由巳至酉延燒居民五十三萬家士民上書咸訴濟王寃者侍御史蔣峴史黨獨唱邪說謂火災天數何預故王事遂劾方大琮王逸劉克莊皷扇異論同日去國并斥進士潘昉姓同逆賊語渉不順皆論以漢法自後羣臣無敢言者監簿徐鹿卿面對其畧曰臣聞至不可玩者上天之怒心尤不可忽者斯民之疑心知所以解人心之疑則可以息天地之怒矣陛下嗣承丕緒十有四年其間災異何所不有三變為尤大辛卯之災人以為權臣專擅之應陛下方且念其羽翼之勞潛晦委重於是天怒未息而儆之以喪師失地之變三京之敗人以為諸臣狂易之致顧乃委曲諱護三年而始下哀痛之詔於是天怒未息而警之以息雷之威明禋之異人以為爕理非人之咎陛下雖能逐一宰臣然舛政宿弊大率多仍其故於是天怒不息而鬱攸之警至於再矣火迫於開元陽徳之宫獨不之燬豈非天以彰我寧宗盛徳以警動陛下之心乎衆心之所疑也椒房之親冨顯之可也節鉞之華不以待有功而汲汲及此恩寵先之火亦先之衆心之所以重疑貴親懿戚人頗議其干請之數火越兩河而徑趍之所以愈疑也非獨四疑又有三謗政令出於朝廷是矣然御筆時至於中書宣諭或及於要地事關封駁不免留中名在曰簡間煩貼方面置局以行囑托每有科降樁留供費此錢此物歸之誰乎朝廷每一舉措令未至而彼亦知之每一議論未決而彼亦聞之臣以為不窒交通之路則謗不解除授出於公朝是矣然除目未頒已有謂某為某邸之客某登某人之門既而有脗合者矣除目既下則又曰某出於懿㫖之叮嚀某出於御札之訓諭雖卑官小職有不能不然者矣伴食故臣生無錙銖之勞沒乃論定策之功潛邸外姻他豈不可薄加恩數而參錯於邊方守倅之任臣以為不杜僥倖之門則謗不解天之所以怒也佚樂不足以奪憂勤足矣邊風儆急而増置嬪妃之閣錫宴雖罷而未徹排當之常名稱不正之人得以出入宫掖臣以為不絶逸豫之謀則謗不解天之所以怒也因疑生謗因謗生疑陛下欲回天意則凡羣言之所指不必校曲直不必論是非痛自刻厲而速改之人心悅而天意解矣十月北兵犯安豐軍知軍杜杲有備北兵至以火炮焚樓櫓隨陷隨補以巴圖硬軍斫牌權巴圖魯者皆死囚為之攻城以自贖取披甲以牛羊十餘重為之設面簾以障矢公募善射者用小箭專射其目盡中之北兵填壕為二十七壩次分兵扼壩北兵乗南風縱燎俄至風雨雪驟至乃募壯士奪壩路士皆奮躍死戰北兵退池帥吕文徳突圍入協力捍禦淮右以安文徳安豐人魁梧勇悍嘗鬻薪城中趙葵於道傍見其遺屨長尺有咫訝之或云安豐鬻薪人也遣吏訪其家值文徳出獵暮負鹿各一而歸留吏一宿偕見趙留之帳前在邊立功遂至顯宦戊戌嘉熈二年詔三衙及諸軍綂制舉堪充將材二人詔舉通曉兵財人才春安豐軍捷書至杜杲進三秩授將作監兼淮西安撫尋除知廬州浙江水災遣使施惠風雹為災赦宥淮蜀四月上親試舉人賜周坦以下及第出身有差時邵澤同廷對有中貴人巡按見邵澤所磨京墨甚佳擬求之澤與無吝色中貴曰主上三日前御苑中方建一亭命名曰定一上曰若人用此立説取為狀元邵得其說揮毫如飛中貴見其文字回奏曰陛下三日前方建定一亭一士人用此立說上大喜於是捜求此卷遂得邵澤欲寘首選時已取周坦為狀元羣臣賀曰喜陛下今日得周邵於是澤為榜眼九月察罕擁北兵八十萬圍廬州約先破廬後造舟巢湖以窺江於壤外築土城周圍六十里穿兩壕攻具皆數倍於犯公安者杜杲與客登城四郊鐵騎極目無際北兵日夕用攢砲攻打杲恃串樓為固北兵築壩凡高於樓城杲以油灌草即壩下煉之皆為煨燼又於串樓内立雁翅七層俄砲中壩上衆驚杲乗勝出戰追躡數十里北兵遁去杲又練舟師扼淮河遣其子庶監吕文徳聶斌軍伏精銳於要害兵遇伏不能進或曰公何以知其必勝杲曰力守淮河以迂其道也舉遺逸補錢時吳如愚官放行溷補命王禁察訪江面詔犒擺鋪軍較財用司殿最趙康奏㑹計州縣財賦喬行簡奏兵財分委執政置國用房申飭鹽課出祠牒㑹子給四川軍人生劵因旱賑濟寛減冬除杜杲兵部侍郎淮西制置使蒙古國遣使來乃遣使報聘曹觱奏以為和議不可信宋季三朝政要卷一
