body:
  text: 宋季三朝政要卷二理宗己亥嘉熙三年詔覈州縣義倉以備賑濟旱因旱賑䘏寛減詔蠲民三年零租詔兩司築堤捍潮喬行簡用元祐故事平章軍國重事李宗勉左丞相史嵩之入奏就拜右丞相嵩之獨當國一時正人如杜範游似劉應起李韶趙汝騰等皆以不合逐去三相當國時論謂喬失之泛李失之狹史失之專然宗勉清謹守法號賢相薨于位陳鞾為建康留守斬殿司崔福福從趙葵收李全名重江淮後為路鈴奪綂制官王明鞍馬又追逐總所趙監酒親屬鞾委㑹㕔戒諭然終不悛值王步帥綂師過淮乞崔福軍協力因厚遣之福遇賊不擊托言葬女而歸更不申聞大閫主帥亦無如之何鞾以為從本師調遣而蔑視軍法如此若不明正典刑則更相傚效遂斬之既而自劾朝廷奨諭放罪時論以良將難得而鞾以私忿殺之十月虹見風雹為災杜杲破察罕八十萬除權刑部尚書庚子嘉熈四年春正月詔貢舉崇學殖嚌道真地震星變下詔罪已白氣亘天江浙福建旱傷紹興府荐飢蠲紹興府夏稅救嚴州荒都城大荒飢者奪食於路盜於隠處掠賣人以徼利市中殺人以賣日未晡路無行人北使王檝來先是檝請北朝與本國和好嵩之遣使至草地與檝偕來議嵗幣彭大雅使北詔賦稅苗米毋得多科取於民秤提㑹子史嵩之以五折二十七界㑹子五道准十八界一道辛丑淳祐元年正月朔詔舉文武才降詔幸學上幸太學詔周敦頥張載程頥程顥朱熹從祀夫子廟庭黜王安石從祀御書白鹿洞規賜諸生以杜範知貢舉戒飭殿試選識治敢言之士四月上試進士賜徐儼夫等及第出身有差徽州火詔飭監司嚴禁贓吏詔高定子修四朝國史詔别之傑措置戰禦詔補三衙闗額申明常平義倉杜範拜右相範性剛介以不阿附時相去位曹豳奏三閫和戰之義不同壬寅淳祐二年賞趙武築夔城雨雹詔六曹寺監錢榖並上籍于朝别之傑入覲言邊事旌王定葉武子恬退賜趙葵出身同知樞宻院事詔軍功就鄉舉者聽賑濟紹興處婺水澇劉漢弼言茶法十六事李曽伯乞主守視徐榮叟參知政事李公韶與宰相議不合求去清叟曰韶議論無阿附朝行如此士夫絶少安可去言不聽而榮叟求去杜杲解儀真圍功進敷學給諸軍雪寒錢出米楮令安豐修武備趙時學奏蜀事癸夘淳祐三年春詔科舉求有用之學蠲高郵創收牛租賦稅詔用十八界㑹折錢賞王福等築安豐城申嚴社倉科配之禁召趙葵欲除右丞相葵到京言者謂宰相須讀書人葵知之乃徑出國門上表辭相位曰霍光不學無術毎思張詠之語以自慚后稷所讀何書敢以趙抃之言而自解歸領鄉郡詔撥軍箭給招信軍置策應軍屯京口賞何舜臣舟師策應之功命余玠宣諭蜀劉晉之言蜀當置閫重慶彭大雅守重慶時蜀已殘破大雅披荆棘冒矢石竟築重慶城以禦利閬蔽夔峽為蜀之根柢自此支吾二十年大雅之功也然取辦促迫人多怨之大雅微時有富民資以金榖待以飲饌隨其所需略無厭倦一日富民毆死一鄰人大雅奮然以身當之自入詞于官云此事是某願下獄供析富民賴之免適其年大比太守憐其才俾之就試是秋領舉併釋之次年登科官至朝郎出為四川制置甚有威名識者謂其義氣滿胷前程逺大已見於此矣其築重慶也委幕僚為記不愜意乃自作之曰某年某月某日守臣彭大雅築此為國西門謁武侯廟自為祝文曰大國之卿不拜小國之大夫今大雅拜矣非拜公也拜公之八陣圖拜公之出師表也其文老成簡健如此聞者莫不服之後不幸遭敗而卒蜀人懐其恩為之立廟蜀自丁亥失闗外丙申殘破之餘所存僅數州蜀中財賦入户部五庫者五百餘萬緡入四總領所者二千五百餘萬緡金銀綾錦絲綿之類不與焉既失蜀國用愈窘鄭損既罷朝廷用余玠彭大雅余玠者不覊之士上於布衣中擢用之入蜀作經理四蜀圖奏曰願假十年手挈四蜀之地還之朝廷然後歸老山林臣之願也上許之於是悉遷蜀郡平曠之地分治險要如合州治釣魚山之類是也在蜀十年有經理功大雅亦有勞績玠大雅死用余晦李曽伯皆以貪謬罔功朝廷亦視蜀為墮甑矣吕文徳總綂兩淮出戰軍馬令淮東提刑節制摧鋒軍甲辰淳祐四年春以金淵知貢舉賞曹致包砌山城建龍翔宫於中瓦奉祀感生帝君拆居民屋宇三除之二申嚴州縣受租苛取之禁四月上試進士賜留夢炎等及第出身有差五月劉晉之除諫議大夫吕午除起居郎趙綸除起居舍人王瓚殿中侍御史龔基先胡清獻除察院六月吕文徳依舊侍衛馬軍副都指揮使兼淮西路招撫使節制濠豐宿亳等軍兼知濠州壽春城築甫畢北兵突至植柵重橋絶港以遏援師王鑑等首調制領策應事八月寧宗參配天地差官奏告察院龔世基奏川蜀京襄兩淮守備及擇將選兵事劉大諫奏維功賞以勵軍心明分義以定人心寛征賦以悅民心鄭起潛除權兵部尚書戒邊將毋擅興戎孟珙造戰車招河南八郡來歸招江淮失業人置武勝軍詔犒壽春解圍安豐策應將士李曽伯為荆湖制置使賞萬春等招遊擊軍史嵩之進四朝中興史詔兩浙郡邑夏稅折帛並以楮凖錢范知院再乞歸田里不允九月項容孫除吏部侍郎葉賁起居郎陳螘權工部侍郎陳一薦兼權禮部侍郎韓祥起居舍人命御史監銓試察院胡清獻奏乞禁戢兩浙和買江西運綱福建和糴廣南丁錢擾民四弊史彌忠薨上遺表特贈少師保寧軍節度使鄭國公仍令有司定諡以聞史嵩之丁父彌忠憂詔起復右丞相兼樞宻使永國公令學士院降制先是黄濤上書乞斬嵩之以謝天下劉應起上疏謂嵩之牢籠既密則陛下之國危省元徐霖上書言其姦深擅權上不之悟至是侍郎徐元杰上疏令其終喪史憾之上亦不聴太學生黄愷伯金九萬孫翼鳳何子舉等百四十四人上書曰臣等恭覩御筆起復右丞相史嵩之令學士院擇日降制臣等有以見陛下念時事之多艱重大臣之去也臣等切謂君親等天地忠孝無古今事親孝故忠可移於君自古求忠臣必於孝子之門未有不孝而可望其忠也宰我問三年之喪於夫子而曰期可已矣其意欲以期年之近而易三年之喪夫子曰予之不仁也子生三年然後免於父母之懐夫三年之喪天下之通喪也予也有三年之愛於父母乎夫宰予期年之請夫子猶以不仁斥之未聞有聞父母垂亡之病而不之問聞父母已亡之訃而不之奔有人心天理者固如是乎是不特無三年之愛於其父母且無一日之愛於其父母矣宰予得罪於聖門而若人者則又宰予之罪人也此天地所不覆載日月所不照臨鬼神之所共殛天下萬世公論之所共誅其去夷狄禽獸不逺矣且起復之說聖經所無而權宜變禮衰世始有之我朝大臣若富弼一身佩社稷安危進退係天下重輕所謂國家重臣不可一日無者也起復之詔凡五遣使弼以金革變禮不可用於平世卒不從命天下至今稱焉至若鄭居中王黼輩頑忍無恥固持禄位甘心起復絶滅天理卒以釀成靖康之禍往事可覆也彼嵩之何人哉心術回邪蹤跡詭祕曩者間督府以和議墮將士心以厚貲竊宰相位羅天下之小人為之私黨奪天下之利權歸之私室蓄謀積累險不可測在朝廷一日則貽一日之禍在朝廷一嵗則貽一嵗之憂萬口一辭惟恐其去之不亟也嵩之亡父以速嵩之之去中外方以為快而陛下起復之命已下矣陛下姑曰大臣之去不可不留也嵩之不天聞訃不行乃徘徊數日牽引姦邪布置要地彌縫貴戚買囑貂璫轉移上心衷私御筆必得起復之禮然後徐徐引去大臣居天子之下位百官之上佐天子以孝治天下者也孝不行於大臣是率天下而為無父之國矣鼎鐺尚有耳嵩之豈不聞富公不受起復之事乎而乃忍為鄭居中王黼輩之所為耶臣謹按古禮親有疾飲藥子先嘗之嵩之於其父之病也盍涕泣以告陛下曰臣父年八十餘矣恐朝夕不相見矧陛下春秋鼎盛臣事陛下之日長而事父之日短願陛下哀而賜之歸使臣一見老父終天何憾陛下以孝敎天下未必不可其請也今嵩之視父病如路人方峩冠整佩洋洋入政事堂鼎食談笑無異平昔昔李密有言臣無祖母無以至今日祖母無臣無以終餘年烏鳥私情願乞終養密之於祖母猶爾嵩之之於父獨不然乎臣又按禮經父母之喪見星而行見星而舍嵩之於父之死也盍號泣於昊天曰某不孝父病不及藥是罪大矣今父死不及殮欲與俱殞不可得也星馳奔赴雖日行百里可也今嵩之視父死如路人方經營内引摇尾乞憐作飛鳥依人之態又擺布私人以為去後之地暨姦謀已遂乃始從容就道初不見其有憂戚之容也晉顧和喪母其君欲起之和曰古者固有釋衰絰從王事者以其才足濟時也如和不才秪以傷孝道壞風俗爾時人高之和在衰世猶能盡其孝道以厲風俗嵩之身為台輔曽一顧和之不若乎且陛下所以起復嵩之者為其有折衝萬里之才歟嵩之本無捍衛封疆之能徒有劫制朝廷之術彼國内亂骨肉相殘天使之也嵩之貪天之功以欺陛下其意以為三邊雲擾非我不足以制彼也殊不知敵情叵測非嵩之之所能制嵩之徒欲以制敵之名以制陛下爾陛下所以起復嵩之者謂其有經理財用之才歟嵩之本無足國裕民之能徒有私自封殖之計且國之利源鹽筴為重今鈔法屢更利之歸於國者十無一二而聚之於私帑者已無遺算國家之土壤日削而嵩之田宅益廣國家之帑藏日虚而嵩之之囊槖日厚陛下眷留嵩之將以利吾國也殊不知適以貽吾國無窮之害爾嵩之敢於無忌憚而經營起復為有彌逺故智可以效尤然彌逺所喪者庶母也嵩之所喪者父也彌逺奔喪而後起復嵩之起復之後而後奔喪以彌逺貪黷固位猶有顧藉丁艱於嘉定改元十一月之戊午起復於次年五月之丙申未有如嵩之匿喪罔上殄滅天常如此其慘也且嵩之之為計亦姦矣自入相以來固知二親耄矣為有不測旦夕以思無一事不為起復張本當其父未死之前已預為必死之地近畿總餉本不乏人而起復未卒哭之馬光祖京口守臣豈無勝任而起復未經喪之許堪故里巷為十七字之謡也曰光祖做總領許堪為節制丞相要起復援例夫以里巷之小民猶知其姦陛下獨不知之乎臺諫不敢言臺諫嵩之爪牙也給舍不敢言給舍嵩之腹心也侍從不敢言侍從嵩之肘腋也執政不敢言執政嵩之羽翼也嵩之當五内分裂之時方且擢姦臣以司㗋舌謂其必無陽城毀麻之事也植私黨以據要津謂其必無惠卿反噬之虞也自古大臣不出忠孝之門席寵怙勢至于三世未有不亡人之國者漢之王氏魏之司馬是也史氏秉鈞今三世矣軍旅將校惟知有史氏天下士大夫惟知有史氏而陛下之左右前後亦惟知有史氏陛下之勢孤立於上甚可懼也天欲去之而陛下留之堂堂中國豈無君子獨信一小人而不悟是陛下欲藝祖三百年之天下壞於史氏之手而後已臣方涕泣裁書適觀麻制有曰趙普當乾徳開創之初勝非在紹興艱難之際皆從變禮迄定武功夫擬人必於其倫曽於奸深之嵩之而可與趙普諸賢同日語耶趙普勝非在相位也忠肝貫日一徳享天生靈倚之以為命宗社賴之以為安我太祖高宗奪其孝思俾之勉承王事所以為生靈宗社計也嵩之自視器局何如勝非其不能企其萬一况可匹休趙普耶臣愚所謂擢姦臣以喉舌者此其驗也臣又讀麻制有曰諜諗憤兵之聚邊傳哨騎之馳况秋高而馬肥近冬寒而地凜方嵩之虎踞相位之時諱言邊事通州失守至踰月而後聞壽春有驚至危急而後告今圖起復乃密諭詞臣唱言邊警張皇事勢以恐陛下葢欲行其劫制之謀也臣愚所謂擢姦臣以喉舌者又其驗也切觀嵩之自為宰相動欲守法至於身乃跌蕩於禮法之外五刑之屬三千其罪莫大於不孝若以法繩之雖置之鐵鉞猶不足謝天下况復置諸巖巖具瞻之位其何以訓天下後世耶臣等於嵩之本無宿怨私忿所以争進闕下為陛下言者亦欲挈綱常於日月重名敎於泰山使天下後世為人臣為人子者死忠死孝以全立身之大節而已孟軻有言學則三代共之皆所以明人倫也臣等久被敎育此而不言則人倫掃地將與嵩之胥為夷矣惟陛下裁幸武學生翁曰善六十七人上書言史嵩之略曰天下不幸有無父之人不可使有無父之國父年高而不之懼父疾篤而不之省及父身歿而不之慼此市井小人不顧亷恥不恤物議者容或有之世所指目為無父之人也人而為無父之人其禍特止於一身國而為無父之國其禍將及於天下陛下為綱常之主正當以仁孝治天下以忠義律臣子乃以不忠不孝之人位之父兄百官之上其何以為訓耶京學生劉時舉王元野黄道等九十四人上書略曰天下有一日不可廢之人倫人心有一日不可冺之公論大倫之盡廢固不足為亂臣賊子羞公論之不冺所以為宗廟社稷慮先儒謂事親之情可奪則事君之情亦可奪政以不忠實厚於不孝無父必至於無君此理之必然也陛下拳拳於嵩之之不忍釋者豈以秋風向深冬寒又迫非嵩之素諳敵情熟識邊事莫能當此寄耶然臣等不憂敵國之勢盛而憂陛下之勢孤昔者金人之盛十倍韃人吾國之專政者秦檜爾檜死而逆亮南牧兵號百萬孰不束手無策時宰臣陳康伯以静定運廟謨詞臣虞允文以忠義鼓士氣竟能成采石之捷成誅亮之功檜之死而有陳康伯虞允文孰謂嵩之之去而無如康伯允文者耶惟是陛下所進今不知其亡凡當世傑特之士皆銷落於嵩之排擯之餘如王萬謝方叔以争不勝最先去游似以大政不使聞而激之去劉應起以轉對直言去張磻以轉對觸諱去劉漢弼以臺論攻嵩之之黨去趙與懽以才名軋已而嗾逐去李韶以侍從數嵩之之專柄去王伯大以意向不合去趙汝騰以麻詞無佞語隂摘其小疵而遣去徐榮叟趙葵皆墮其機穽去别之傑號為長厚又以每事必問本末假托而擠之去杜範尤為簡聖眷負人望上前敢論諍遇事有分決則又用李鳴復而速其去竊聞王正月乙夘太學九士扣閽上疏乞罷鳴復而留範九士囊封未徹於宸旒之聴而翹館之門生已入臺端矣庸邪小人奉承唯謹即令同僚交章論範陛下所藉以為耳目心腹者皆盡空於嵩之之一網陛下雖尊居九重身處佚愉旁無可謀之人外無入告之益是以獨善之清躬游於史氏之黨局君父至此天下謂何宗學生與寰等三十四人上書略曰肅讀麻制私切有疑陛下謂其修法度能制夷狄能運掉三邊能發縦百將又謂嵩之可以慰中外之望凡此數者必非陛下之意為陛下之喉舌乃嵩之之腹心小人之無忌憚者也嵩之不孝上徹于天弔者在門賀者在閭即欲捨苫塊而坐廟堂脫衰絰而被公衮是可忍也孰不可忍也縱使陛下屬念史氏則公圭旄節魚鱗雜襲陛下之恩亦至矣而嵩之今乃一日不肯釋相位者其意將安底止耶惟陛下決去大姦則社稷幸甚建昌敎授盧鉞與太學生同日上書皆不報太學武學宗學再伏闕上書劉鎮又上封事上意頗悟嵩之乃奏劄辭免武舉劉耐叛四學上書略曰嘗觀秦人焚坑之禍漢末黨錮之獄使名士淪亡典籍消滅以貽千百年不可追之恨者其端始於一二愚士横議爾春秋戰國之士聚于鄉校以議執政之然否或請毀鄉校而子産不許孰不以是賢子産也臣猶恨子産於此時無以變士習淑人心而付之自然陛下尊居天陛置輔相於左右葢將以立國也而輕儇浮薄者乃指名大罵自輔相至於臺諫侍從而下或目之以禽獸或指之以鬼魅或斥之以盜賊然則朝廷何以為朝廷中國何以為中國信斯言也生人之類滅久矣若使嵩之真要取起復而後去真匿喪旬餘而後發固無逃天下後世之議若嵩之聞訃未嘗匿喪而起復之命真出陛下憂時之本心亦當顯告天下下臣此章揭示四學輕儇浮薄者有所警戒於世道實非小補太學齋廊榜云丞相朝入諸生夕出諸生夕出丞相夕入時相惡京學生言事謂皆遊士鼓倡之諷宗尹趙與喪逐遊士諸生聞之作捲堂文辭先聖以出曰天之將喪斯文實係興衰之運士亦何負於國遽罹斥逐之辜静言思之良可醜也慨祖宗之立國廣學校以儲才非惟衍豐芑以遺後人抑亦隆漢都而尊國士肆惟皇上克廣前猷炳炳宸奎釐為四學戔戔束帛例及諸生蒙敎育以如天恨補報之無地但思粉骨寧畏觸機直言安石之奸共惜元城之去實惟公議不利小人始隂諷其三緘終盡打於一網不任其咎歸過於君是誠何心空人之國昔鄭僑且謂毀校不可而李斯尚知逐客為非彼既便已行之吾亦何顔居此厄哉吾道告爾同盟見義而不為當行已而有恥茍為飽暖是貪周粟之羞相與攜持毋蹈秦坑之慘斯言既出明日遂行京尹遂盡削遊士籍乙巳淳祐五年春詔求通天文厯算之人閔雨日食降詔申嚴稅賦重催抑勒之禁築泗州城出楮米為泗州城池費杜範再入相薨于位劉漢弼以腫疾死徐元杰暴卒時謂諸公皆中毒堂食無敢下筯自淳祐至寳祐正人指邪為邪邪人指正為邪互為消長詔撫綏中原遺民出楮付殿司造軍器史嵩之以永國公致仕范鍾等上玉牒等書趙葵乞造戰船以備緩急令沿海團結三郡民船出楮百萬犒水陸戰守諸軍陳鞾參知政事同知樞密院事范鍾罷相時游似與鍾並相不協鍾以臺諫罷鍾方坐都堂臺吏以牒呼而出之丙午淳祐六年春詔三學舉經明行修氣節之士張磻言治兵理財賜劉克莊出身領史事賞蕭逢辰買馬修城詔賈似道任責山寨城築召鄭清之侍講經筵置國用所旌林公遇恬退詢所欲言胡穎有威名每見淫祠即毀之人呼曰胡打鬼丙寅為廣東經略廣州僧寺佛像中有巨蛇藏於内時出享人祭祀僧托之題疏得錢數千緡穎至毀其佛擊死巨蛇而投諸江正僧人之罪籍其錢以投官其怪遂息奏請禁淫詞上從之作集慶宫以祈福詔舉閫臣計臣章鑑疏乞儲才丁未淳祐七年春以吳潛知貢舉游佀罷相鄭清之闕蘷人皆寃之徐清叟參知政事時余玠專制於蜀每交結權要及中外用事者奏牘詞氣悖慢示敢專制之狀上意不平之徐清叟奏云余玠不知事君之禮陛下何不出其不意而召之上不荅清叟留班奏云陛下豈以玠握大權召之或不至耶臣度玠素失士心必不敢上乃從其言癸丑寳祐元年徐清叟奏當守東海漣水賈似道海城獻捷四月士人太學補試士人入試蹂踐而死者衆温台處大水申嚴廷試挾書之禁北使到濠州召余玠以本職奏事庚牌到蜀而玠以漢中敗績而歸羞愧飲藥而死十一月大閱上試進士賜姚勉以下及第出身有差上問邊報如何忽襄閫奏捷上大喜甲寅寳祐二年以余晦宣撫西蜀道而行奏云晦非其才乞收回差遣上不報徐清叟奏云朝廷命令不甚行於西蜀者十有二年矣今者天斃此玠乃祖宗在天之靈社稷無疆之福陛下大有為之機也今乃以素無行檢輕儇浮薄不堪任重如晦者當之臣恐五十四州軍民不特望而輕鄙之夷狄聞之亦且竊笑中國之無人矣所有除晦内批乞賜收回上責清叟曰數十年來未見執政繳回成命者卿若固執則廟堂之間同列之義皆有不安詔命已頒決難反汗其後晦果敗蜀失紫金山要地為其城之録余玠家財助蜀詔撫諭四川官吏軍民北兵築利州閬州收復安西堡奏捷上大喜乃賞將士之有功者賈似道城東海上問淮哨退否詔吕文徳應援上下謝方叔等進經武要略等書徐清叟除知院兼參知政事清叟奏蜀置四帥排保甲行守實法安南國王加封奉正功臣措置錢楮余晦斬王惟忠惟忠與晦俱浙東人少微賤晦小名余再五以余天錫之薦為四川制置使時惟忠為利路安撫閱除目笑曰余再五來也晦聞之怒誣奏惟忠潛通北境下大理寺勘官陳大方承㫖煅成之惟忠斬於市血流而上惟忠色不變謂大方曰吾死訴於天未幾大方朝恍惚與惟忠還遂卒乙夘寳祐三年春正月詔郡國取典雅恢閎之才謝方叔罷相言者謂方叔之政皆出子弟故罷相制云政權皆由滈出人謂斯何國事非當窋言父訓安在以董槐為右丞相三月己未雨土雲南有北兵思播當嚴為備詔邊事許盡言不許傳播賈似道興復廣陵堡城蜀郡地震均州築城龍山四川兵財並聴宣司詔温和守鬲奴堡以守光化巴州獻捷諸州禁兵不得差借敎閲精加選擇六月丁大全除司諫陳大方除正言胡大昌除侍御時目大全大方大昌為三不吠犬令諸路自實田畝以覈滲漏徐清叟曰自實乃秦之弊法不可再復數月兩浙江東西民甚苦之上一日臨朝曰自實擾民可且住行御史洪天錫劾内官盧允升董宋臣疏不行而去國臣璫董宋臣迎逢上意起梅堂芙蓉閣奪豪民田引倡優入宫招權納賄無所不至人以董閻羅目之時閻妃怙寵馬天驥丁大全用事有無名子書八字於朝門云閻馬丁當國勢將亡兩淮奏擒舊海偽元帥丙辰寳祐四年詔舉亷吏邊備合加申嚴立安邊太平局董槐罷相時丁大全為監察御史奏槐章未下先調臨安府隅兵百餘人挺刃圍其第以臺牒驅迫出之時有詩云空使蜀人思董永恨無漢劔斬丁公程元鳳為右丞相太學生陳宜中等上書攻丁大全大全怒取㫖陳宜中黄鏞林則祖曽唯劉黼並削籍編置下臨安府押出國門祭酒司業率二十齋學生冠帶送出圜橋府大全愈怒立碑三學戒勵諸生毋得譸張噪吻妄議國政又令今後諸生上書須前廊學官看詳牒報檢院方許聞奏四月上試進士賜文天祥等及第出身有差撥官誥祠牒收換弊楮並從焼毀出庫錢兌使出新川㑹收換川引賈似道參知政事兩淮大使下詔訓貪詔戒掊克定趙與􅊸招軍名遊擊蜀中得捷奏加警備因蜀捷趣上功恤流離優恤援蜀戍兵韃靼兵築棗陽冬犯襄陽為援郢計奬諭李曽伯復襄樊嚴加老鼠隘韃靼兵留大理國浙江堤成賜安南國奬諭上欲復用嵩之詔除觀文殿大學士落致仕與前執政恩數蔡抗奏乞收回恩命三學上書攻之遂依前致仕卒上以御寳黄冊催内蔵坊場錢知嚴州吳槃奏言内庫理財太急督促大峻龍章鳳篆施於帑藏之催科寳冊泥封下同官吏之文檄居萬乗之崇高而商財賄之有無事雖至微闗係甚大它時青史書之曰以節寳督坊場錢自今日始何以為萬世法董宋臣諷臺諫邵澤劾之丁巳寳祐五年詔以新美士習為先趙葵乞招軍十萬趙葵水陸並進大捷褒淮閫獻捷姚永慶言蜀中便宜蜀中之捷詔安集蜀民蜀報北兵犯巖州置廣右堡塞築宜州城防窺伺邕宜分洞兵控扼施黔吳淵乞萬兵備瀘溆思播劄蒲擇之措置鹽井等隘賈似道奏築荆州城謀收復光棗丁大全入相大全得寵在室横甚宰執畏之依憑二竪竟彈逐宰相而據其位程元鳳進玉牒等史十月虹見臨安火申儆邊備詔整舟師之備放逃亡軍請蠲州郡欠内帑項目督責郵遞稽滯贓吏周福孫貸命流二千里戊午寳祐六年春正月元旦戒飭惜名器程元鳳罷相詔帥臣謹邊備毋恃其不來馬光祖向士壁自捐軍費詔諸閫招填軍額北兵窺苦竹隘諭蒲擇之守苦竹隘韃靼兵窺劔門又窺東川令蜀將各分地分防禦劉雄飛捷于横山雄飛本隆興府犯事人解至鄂州收繫一日得脫宿荒沙壩中夜半見天門開心切自喜遂投充揚州制司敢勇軍出軍有功似道辟差權和州不數日除知州遷四川制置使韃靼兵犯安南田應寅乞屯瀘溆援思播乃修築思播闗隘調兵防播州支徑差官相度置黄平屯趣徐敏子防邕宜韃靼兵侵羅氏鬼國屯兵為交人聲援長寧軍脩築凌霄城成監司郡守不許擅支官錢楊禮堅守安西堡進官詔督府江淮制置進援上流分遣舟師防拓趙葵申隨州之捷光化之捷襄樊解圍賑卹過江轉徙淮民出米賑糴收弊楮徐涇孫除給事中韃靼兵哨通泰又哨安豐守臣迎敵却之繼而懐逺連水皆奏捷詔嚴備上流杜庶除刑部郎辭免陞寳章閣仍舊淮西憲兼知廬州主管安撫司公事宋季三朝政要卷二
