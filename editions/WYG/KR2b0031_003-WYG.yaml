body:
  text: 宋季三朝政要卷三理宗己未開慶元年春正月朔戒中外奉公行實政鑄開慶錢三月辛酉雨土修築江塘賑滁州水災四月上試進士賜周震炎等及第出身有差時公主方選尚丁大全欲用新進士為駙馬因命考官私寘震炎為第一倡太平狀元之說以媚上震炎草茅士年幾三十矣恭謝日公主於内窺之不悦事遂􅃦丁大全敗震炎降第五甲出身新築黄平隘賜名鎮逺州戍兵守備以防雲南王登提兵入蜀更蜀戍兵増蜀戍兵劵賞龍州守城築功詔蜀許便宜行事勑廣帥李曽伯備廣西行廣郡守賞罰秋九月韃靼國憲宗皇帝親帥大軍入蜀勢欲順流東下一軍自大理國斡腹南來厯邕桂之境南至静江府廣帥李曽伯閉門自守一軍渡江圍鄂州時相匿報若罔聞知吳潛涕泣入奏上以賈似道為宣撫視師江上吕文徳提兵援蜀蜀人稍安催蜀漕運十月丁大全罷吳潛入相上以賈似道為右相荆湖宣撫策應大使進兵援鄂州趙葵為樞密使江東西宣撫策應大使屯兵信州遏廣右斡腹之師北兵陷連水軍淮楊大震杜庶除大理卿制置兩淮知揚州上諭庶曰前守合肥淮右賴以奠安今畀以全淮之寄尤藉聲譽父子家傳可謂無忝監察御史饒應子言今之精兵健馬咸在閫外湖南江西地僻兵稀雖老臣宿將可以鎮壓然無兵何以運掉敵之來當自内托出不當自外趕入上然之韃兵破江州瑞州衡州圍潭州邊報轉急都城團結義勇招募新兵築平江紹興慶元城壁議遷都軍器大監兼左司何子舉言於丞相吳潛曰若上行幸時則京城百萬生靈何所依賴必不可遂與俱入見面陳剴切謝皇后亦請留蹕以安人心上乃止謝枋得率鄧傳二社二千餘人舉義擢兵部架閣攻斷遼州浮橋吕文徳乗風戰勝向士壁帥潭北兵至向親帥軍民且戰且守既置飛江軍又募斗弩社朝夕親自登城慰勞潭城固守斗弩之力居多㑹南來二哥元帥卒潭圍先解北兵至鄂州都統張勝權州事城危在頃刻勝登城諭之曰城子已是你底但子女金帛皆在將臺可從彼去北兵退焚焼城外民居巋然一壘未幾高達卭應引兵來似道駐漢陽軍為聲援而鄂州固守不下殿司崔彦良援隆興彦良崔福子也以兵三千援隆興時趙葵督視江淮退保隆興閉門自守崔兵至城下不得入邸報北兵至生米市距城三十里彦良渡江迎敵北兵退而保隆興者彦良之功居多十一月詔罪已求言詔賈似道移司黄州黄在鄂下流中間乃韃騎往來之衝孫虎臣將精騎七百護送至青草坪候騎白前有兵似道愕曰奈何虎臣匿似道出戰似道歎曰死矣惜不光明俊偉爾既而韃兵乃老弱部止掠金帛子女而囘江西叛將儲再興騎牛先之虎臣擒再興遂入黄州召徐清叟赴闕力辭韃靼憲宗皇帝晏駕於釣魚城下似道乗機遣使約和隂許歳幣兵解而去潭州捷書至上曰向士壁忠赤可尚下詔褒賞雪寒犒海道戍兵出内庫銀絹付宣司支費庚申景定元年春正月何子舉除華文閣待制江淮諸路察訪使三月三日鄂渚北兵退夏貴總領舟師五奏捷及新生洲之捷命夏貴總領諸將貴資精悍能夜視工劫寨累有戰功軍中謂之夏爺爺少時以罪刺雙旗故又謂之夏旗兒理宗嘗圖其形觀之白氣如疋亘天催造戰船蠲放北兵所踐州縣税四月韃靼國色辰皇帝即位五月十九日改元中綂兵退行打算法賈似道忌害一時之閫臣故欲以此汚之向士壁守潭城費用委浙西閫打算趙葵守洪則委建康閫馬光祖打算江閫史巖之淮閫杜庶廣西帥皆受監錢之苦累及妻子徐李杜逮繫獄杜死後追錢猶未巳也謝枋得舉民義科降招軍錢給義兵米及行打算枋得曰不可以累趙宣撫也自償萬楮餘無所償乃上書賈相云千金而募徙木將取信於市人二卵而棄千城豈可聞於鄰國乃得免焉賈似道入朝以右相兼太子太師賈似道入相理宗之季官以賄成宦官外戚用事似道為相年深逐巨璫董宋臣李忠輔勒戚畹歸班不得任監司郡守百官守法門客子弟歛迹不敢干政人頗稱其能然天資奸邪險詖置縁櫃招人告訐立七司法苛密煩碎議者不以為便賈似道奏使守令暗收舊楮乃撥見㑹收弊㑹招捕浙西鹽子詔陞巢縣為鎮巢軍使建寧府産嘉禾于建陽改嘉禾縣李松壽犯淮安廣太學進取之法録用恬退消奔競蠲放北兵所踐州縣稅禁獻羡餘修京城鑄景定元寳錢吕文徳制置荆湖知鄂州李庭芝安撫兩淮圖復漣水瀘州漣水之捷北使郝經來尋盟先是似道出師隂許北朝嵗幣大兵退自詭有再造功諱言前事拘留于真州不遣七月貶吳潛建昌軍㝷徙潮州潛為人豪雋其弟兄亦無不附麗有讒于上者曰外間童謡云大蜈蚣小蜈蚣盡是人間業毒蟲夤縁攀附有百尺若使飛天能食龍此語既聞惑不可解而用之不堅亦以此也上以寧宗正史未畢令陳宜中等修撰免蜀郡聖節銀八月兩淮制置李庭芝奏李全子璮歸國丁大全謫貴州大全鎮江人藍色鬼貌小官時為戚里婢壻夤縁以取寵位事内侍盧允昇董宋臣上信任之擢監察御史遷正言在臺横甚引臺小人沈翥方大猷為羽翼輒登相位北兵渡江大全匿報幾誤國事遂罷相㝷謫貴州與州將游翁明失色盃酒間游誣告丁相有異謀隂造弓矢將通蠻為不軌朱稷孫以聞于朝加竄新州土牢拘管日具存亡申遣將官畢遷護送舟過藤州擠之於水而死十月以弟嗣榮王與苪之子禥為皇太子封忠王賜名壡納妃全氏全氏乃理宗母慈憲夫人姪孫女度宗為忠王時議納妃丁相大全議聘知臨安府顧嵓女從己未已納聘而謝后意不悅又㑹有江上之儆乃緩其事至是改聘全昭孫女全氏為妃竄方大猷于嶺南斬丁大全强幹高儔夔路奏捷上言廣西宜預防辛酉景定二年春正月癸亥朔申飭百官盡言京湖制司言吕文徳報發勘正張子光張定國龎伸周仲張善張先以蒲澤之黨從在任贓狀繁夥賊船造橋不調援兵攻擊設意降北乞明正典刑乃詔子光定國追毁除名龎伸等四人並流斷七月辛未月犯斗上曰米舟雖至價猶未平似道奏已將豐儲米五萬石賑糶又借本市糶以平其直上曰外郡楮幣如何似道奏乞詔諸路税賦見錢許用各處楮幣的例折納起解諸州縣奉行不䖍重寘于罰上曰借糧之風未戢可申嚴懲治以儆其餘似道奏此事當恩威並舉已講明賑卹之政又令團結保伍俾富者資給之茍復不悛當懲其無良者壬午陳鞾薨撤視朝諡忠肅吳潛責授化州團練使循州安置詔賜吕文徳方團一字金帶八月詔令戸部嚴州縣増收租米斛面之弊癸巳以久雨出封樁庫楮上二十萬賑三衙諸軍豐儲倉米濟都民上曰蜀事可慮似道奏俞興攻取瀘城壞於垂得臣累疏自請一行或可上寛憂顧上曰廊廟事體至重豈宜輕動又奏若文徳入蜀則荆湖與江面闗繫尤重臣不容不往上又曰此未可輕奪向士壁從官恩數令臨安府追究侵盜掩匿情節從侍御史孫附鳳之言也士壁帥長沙北兵已圍鄂岳方措置間皮泉渌家居訪之問所以為城守之計士壁曰正為眼中無可用之人皮恚之北兵退皮入朝百計毀短似道忌其成功竟坐遷謫至今邦人言之有垂涕者賜皇女周國公主第于安濟橋江萬里除端明殿大學士同簽書樞密院事兼太子賔客浙右水澇令朝臣分往各郡商確出粟勸分蠲租賦招勇壯為軍凡救荒之政可速舉行詔詞學科照嘉熈二年例申嚴繆舉改官之罰孫虎臣邳州之捷夏貴知淮安兼安撫賜金幣田北使來上幸太學陞張栻吕祖謙從祀夫子廟庭朱禩孫獻捷壬戍景定三年春楊棟知貢舉徐涇孫等為殿試官詔三學免解一次朱禩孫申創南城書院四月上試進士賜方山京等及第出身有差太學生陳宜中等六人並賜廷對李璮以漣海四州來歸授璮保信武寧軍節度使督視京東河北等路軍馬齊郡王復其父李全官爵璮在北朝授以行臺都督之任及己未退師之後色辰皇帝北歸璮獨不至其子居簡給事宫中婿居相府私相逗引不告而去及濟南等處修築城壁差軍把隘又殺達達軍人遂叛歸南賈似道為相欲行冨國强兵之策時劉良貴為都曹繼尹天府吳勢卿餉淮東入為浙漕遂交贊公田之事殿院陳尭道正言曹孝慶迎合似道之意合奏限田之法自昔有之置官户踰限之田嚴歸併飛走之弊回買官田可得一千萬畝每嵗則有六七百萬之入其於軍餉沛然有餘可免和糴可以餉軍可以住造楮幣可平物價可安冨室一事行而五利興實為無窮之利上然之似道欲用劉良貴吳勢卿專任公田時勢卿已死乃以良貴為提領陳訔為檢閲官以副之良貴請下都省嚴立賞罰究歸併之弊上曰永免和糴無如買逾限之田為良法然東作方興權俟秋成續議施行似道憤然求去上曰買田永免和糴自然良法美意要當始於浙西視諸路為則也所在利病各有不同行移難於一律可令三省照此施行似道内引入劄力言其便上從其言三省奉行惟謹似道遂以自己浙西萬畝為公田倡嗣榮王繼之趙立奎自陳投賣自是朝野無敢言者獨禮部尚書徐涇孫疏言買田之害以言不行乞致仕公田初議以官品逾限田外買官田猶有抑强嫉富之意繼而敷泒除二百畝以下者免餘各買三分之一其後雖百畝之家亦不免立價以租一石者償十八界㑹四十楮不及者減買數稍多則銀絹各半又多則以度牒告身准直登仕三千楮將仕千楮許赴漕試校尉萬楮承信萬五千楮承節二萬楮則理為進納安人四千楮孺人二千楮督催公田以府丞陳訔往湖秀以將作丞廖邦傑往常潤六郡有專官平江則包恢成公策嘉興則潘墀李補焦煥炎安吉則謝奕趙與訔王唐珪馬元演常州則洪穮劉子庚鎮江則章埛郭夢熊江隂則楊班黄伸並俟竣事各轉一官選人減一削守臣並以主管公田繋銜提領劉良貴劾奏嘉興宰葉悊佐以不即奉行之罪又劾長洲宰何九齡追毀出身永不收叙以不合出給官田令田主抱納失田業相離之初意五月公田以江隂軍平江府𨽻浙西憲司安吉嘉興𨽻兩浙運司常州鎮江𨽻總所每嵗秋租輸之官倉特與減饒二分或水旱則别議放數遂立四分司王大吕平江方夢玉嘉興董楷安吉黄震鎮江常州江隂三郡初以選人為之任滿則理為入班州縣鄉都則分差莊官以富饒者充應兩年一替每鄉創官莊一所每租一石明减二斗不許多收其間毗陵澄江一時迎合止欲買數之多凡六七斗者皆作一石及收租之際元額有虧則取足於田主以為無窮之害或内有磽瘠及租佃頑惡之處又從而責換於田主其禍尤慘詔改漣水軍為安東州詔陞東海縣為東海軍評事四員用諸科人充吳潛卒潛初入相以方甫胡易簡為腹心易簡方上議立度宗為太子樞密承㫖何子舉曰儲君未愜衆望建立之議固當詳審潛欲緩其事上不悅北兵退即罷政而似道入相諷臺臣劾其罪貶循州先是詔似道移司黄州黄在鄂上流中間乃北騎往來之衝要似道聞命以足頓地曰吳潛殺我矣疑移司出潛意故深憾之遣武人劉宗申為循守以毒潛潛鑿井卧榻下自作井銘毒無從入一日宗申開宴以私忌辭再開宴又辭不數日移庖不得辭遂得疾以五月卒于循州似道遣宗申毒潛潛死即歸罪於宗申貶死以塞外議奬諭馬光祖城安慶功定御史臺覆試之制夏貴蘄縣之捷蝗蝻得雨不為災蠲四川鹹酤㩁利三年申嚴偽㑹賞罰之令詔兩海不可不守詔州縣稅許用各處楮價折納詔提刑劾所部州縣違戾安南國進貢禮物蠲臨安府稅平物價十月知院徐清叟薨贈少師諡忠簡給諸軍雪寒錢京城大飢馬光祖尹京知榮王府積粟一日往見辭以故次日往亦如之三日又往卧於客次榮王不得已見焉馬厲聲云天下誰不知儲君為大王子今民餓欲死大王不以此時收人心乎王以廪虚為辭光祖探懐出片紙曰某倉幾十萬王辭塞遂許三十萬石光祖即令都吏領鈞批交米活飢民甚衆癸亥景定四年春正月元旦詔舉所知詔吕師夔閲視營屋招募新軍詔褒吕文徳浚築四川城池成都奏藝祖皇帝廟側一合抱木久矣仆地今嵗夏五忽立起而生三芽上製詩以賜羣臣發福建義倉賑糶貧民申嚴鉟銷偽造吕文徳獻羡財蠲紹興延燎居民賃錢以包恢簽書樞密院事恢學師朱陸以道徳儀法當世性疾惡所至戢姦禁暴有政聲尤善平冦平江前為海冦擾命恢往平之時行公田恢奉行稍過頗為公論瀘州太守劉整叛先是北兵渡江止遷蹕之議者吳潛也盡守城之力者向士壁也奏斷橋之功者曹世雄第一而整次之似道功賞不明殺潛殺士壁殺世雄懼禍及已遂有叛意㑹鄭興為蜀帥而瀘州乃其屬郡興守嘉定時被兵整自瀘州赴援興不送迎亦不宴犒興遣吏以羊酒餽之整怒杖吏百而去興有宿憾乃遣吏至瀘州打算軍前錢糧整懼賂以金瓶興不受復至江陵求興母書囑之亦不納整懼以城降北及北軍壓境整集官吏喻以故曰為南者立東廡為北者立西廡官吏皆西立惟戸曹東立殺之與西立二十七人歸北吕文徳復瀘州文徳號黑灰團整叛遂獻言曰南人惟恃一黑灰團可以利誘也乃遣使獻玉帶于文徳求置㩁場於襄城外文徳許之使曰南人無信安豐等處㩁場每為盜所掠願築土牆以護貨物文徳不許使辭去或謂文徳曰𣙜場成我之利也且可因以通和好文徳以為然追使者不及矣既而使者至復申前議文徳遂許焉為請于朝開𣙜場於樊城外築土牆於鹿門山外通互市内築堡文煥知被欺凡兩申制置司為親吏陳文彬匿之北人又於白鶴城増築第二堡文煥再申方達文徳頓足曰誤朝廷者我也即自請赴援㑹病卒甲子景定五年冬十月改咸淳元年元旦詔崇經術考徳行造金銀見錢闗子以一凖十八界㑹之三出奉宸庫珍貨收弊楮廢十七界不用其闗子之制上黑印如西字中紅印三相連如目字下兩傍各一小長黑印宛然一賈字也闗子行物價頓踴詔舉内外官堪充監司郡守者二月辛未雨土行都大火詔貢舉尚淳厚收純雅戒飭百司盡公守法蠲臨安府征三月申嚴戒飭贓吏之制詔秋闈嚴偽守之防禁戢國子冒試鬻牒之弊出㑹賑軍民及犒宿衛豁除義倉陳腐邊郡樁積三年軍餉郤安南國進貢謝塈冦至不禦禠職降官秋七月甲戍彗星出栁芒角燭天長十數丈自四更從東方見日高方歛如是者月餘楊棟謂是蚩尤旗非彗也遭論去國己夘丞相賈似道參政楊棟同知葉夢鼎僉書姚希得奏事上曰彗出於栁朕彰不徳夙夜疚心惟切危懼幸臣奏陛下勤於求治有年于兹寧有闕失實臣等輔政無狀所致上貽聖憂臣見其疏乞罷免庶可以上弭天災上曰正當相與補承闕失上回天意臺臣交章言星變災異皆公田不便民間愁歎不平之所致乞罷公田以荅天意似道力辨人言丐辭相位上曰言事易任事難自古然也使公田之說不可行則卿建議之始朕已沮之矣惟其上可免朝廷造楮之費下可免浙西和糴之擾公私兼濟所以舉意命公行之今業已成矣一嵗之軍餉仰給於此若遽因人言而罷之雖可以快一時之異議如國計何如軍餉何卿既任事亦當任怨禮義不愆何恤人言卿宜安心母孤朕倚毗之意自此公論頓沮矣劉良貴以人言籍籍遂陳括田之勞乞從罷免不允謝枋得校文宣城及建康漕闈發策凡十問言權奸誤國趙氏必亡忤似道貶興國軍時馮夢得知信州恤其家枋得聽其自赴貶所三年遇赦得還似道竒其才欲牢籠之使余安裕諭意枋得不肯阿附賈敗為江東制置募兵援饒州戰于安仁敗績又敗于信州軍潰弃家入閩程御史文海留承㫖夢炎交薦力辭不就至元戊子魏參政天祐執拘北行不食而死冬十月上崩在位四十一年壽六十一上初名與莒福州古田縣宗室父為山隂尉縣人全氏以女妻之遂為越人生理宗資貌龎厚號為烏太保寧宗先以濟王為皇太子嘗謂史彌逺出入禁闥專權弗善彌逺聞之懼隂謀代之囑其客余天錫余以二宗子告即理宗及福王也史請以來自牖間密視之自旦至暮福王不能堪理宗凝然無忤容史出延以飯理宗不顧食之盡史以為有徳量立為沂靖惠王後寧宗崩史矯詔廢濟王立理宗端平初厲精為治信向真魏號端平為元祐在位久嬖寵浸盛宫中排當頻數倡伎傀儡得入應奉端平之政衰矣上自臨御以終始崇奬周程張朱義理之學故得廟號曰理陵曰穆陵御書閣曰顯文殿曰章熈皇子忠王即皇帝位尊謝皇后曰壽和聖福皇太后宫曰慈福詔以明年改為咸淳元年賈似道為山陵使自上即位辭相印歸越州太后兄謝奕封郡王姪堂􅐉塈垕皆節度使宋季三朝政要卷三
