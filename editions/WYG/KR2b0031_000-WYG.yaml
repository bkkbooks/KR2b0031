  text: 欽定四庫全書史部二
  hash: sha256:70556edeacc7a4d441da801d227722e616f1df1cbf685e5227e3ee4acfbaa8df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0031_WYG_000-1a, image: WYG0329/WYG0329-0961a.png}
body:
  text: 宋季三朝政要目錄編年類理宗國史載之過北無復可攷今將理度兩朝聖政及幼主本末纂集成書以備他日史官之採擇云卷一理宗寳慶元年乙酉迄嘉熙二年戊戌卷二理宗嘉熙三年己亥迄寶祐六年戊午卷三理宗開慶元年己未迄景定五年甲子卷四度宗咸淳元年乙丑迄十年甲戌卷五幼主徳祐元年乙亥迄二年丙子卷六廣王景炎本末益王祥興本末臣等謹按宋季三朝政要六卷不著撰人名氏卷首題詞稱理宗國史為元載入北都無復可考故纂集理度二朝及幼主本末附以廣益二王事其體亦編年之流葢宋之遺老所為也然理宗以後國史修宋史者實見之故本紀所載反詳於是書又是書得於傳聞不無舛誤其最甚者謂寶慶元年趙葵趙范全子才建守河據闗之議遣楊誼張迪據洛陽與北軍戰潰歸按寶慶元年葵范名位猶微其後五年范始為安撫副使葵始為淮東提刑討李全時子才乃為㕘議官至端平元年滅金子才乃為闗陜制置使知河南府西京留守有洛陽潰敗之事上距寶慶元年九年矣所紀非實也其餘叙次亦乏體要然宋末逸事頗詳多有史所不載者存之亦可備㕘考其以理宗度宗瀛國公稱為三朝而廣益二王則從附錄體例頗公卷末論宋之亡謂君無失徳歸咎權相持論亦頗正而忽推演命數兼陳因果轉置人事為固然殊乖勸戒之㫖殆欲附徐鉉作李煜墓誌之義而失之者歟乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀宋季三朝政要題辭此書不知何人所作諦觀數四葢有下喬木入幽谷之悲乎余嘗掇拾里中故老舊聞譔厓山小志二卷皆宋史所未具者藏笥中未及梓行丙午夏于役金陵以前笥寓於舊館主人弗戒遂為祝融氏奪去今於吳闗偶得此書於市肆中則勝國善本與余厓山小志互出入亦多宋史所未具故覆梓之葢欲補史家之闕亦以寄余厓山小志未竟之意也萬厯己酉褉日張萱題於金昌闗署
