body:
  text: 宋季三朝政要卷六廣王本末陳仲微咸淳為侍左郎官以言事切直罷乙亥除兵部侍郎修國史丙子從二王入廣目擊當時之事逐日抄録崖山敗流落安南臨歿有詩曰死為異國他鄉鬼生是江南直諫臣安南國主以詩挽之曰痛哭江南老巨卿春風揾淚為傷情無端天上編年月不管人間有死生萬壘白雲遮故國一堆黃壤覆香名回天力量隨流水流水灘頭共不平壬午嵗安南國使入覲因言仲微之事而得仲微所著二王首末重加編次以廣其傳丙子正月戊寅廣王益王航海二月廣王益王由海道趍溫州二王駐溫州之江心寺蘇劉義陸秀夫來㑹時陳宜中海航泊清澳門諸人往見之共議興復張世傑自定海至同趍三山三月甲戍二王至福州宣太皇太后手詔廣王是為天下兵馬都元帥益王昺為副元帥檄召天下諸路忠義同奬王室五月一日廣王登極于福州升福州為福安府改威武軍為行都之門大都督府為垂拱殿便㕔為延和殿詔改元以德祐二年為景炎元年遙上尊號太皇太后曰聖壽和福至仁太皇太后全太后曰仁安皇太后少帝曰孝恭懿聖皇帝進冊母淑妃為皇太妃封弟益王昺為衛王妹壽和公主為晉國公主以九月二十八日為天熙節陳宜中左丞相張世傑少保樞密副使陳文龍劉黼參知政事蘇劉義開府儀同三司殿前指揮使司馬王剛中知福安府事是日百官待漏門外門未啓有物哮吼聲朝士有驚仆者黃萬石以北命諭福建歸附卲武降建劔守臣拒之督府遣兵復卲武萬石遁壬戍文天祥至自行都除右丞相時國方草創陳宜中專制於張世傑議論不合遂不肯拜議出督六月以趙溍為江西制置使進兵卲武謝枋得江東制置使進兵饒州李師夔方興張德分道進兵浙東朱浚江西詔諭使毛統由海道至淮約兵㑹合先是文天祥自通州歸具言太守楊思復欲得海船數百艘可以直趍勤王陳宜中不以為信乃遣毛統之汀州而不以告天祥統至通州守問文丞相何以無書守怒統幾不免統出而通州降矣七月文天祥開督于南劔時林琦自杭來監丞鄒鳳自衢來一時忠義之士莫不翕集鄒鳳江西招諭副使分上下三郡備守以王績翁為福建提刑招捕使知南劔州任責上三郡備守黃佺同提刑招捕知漳州任責下三郡備守九月文天祥進兵汀州十月行十一月至汀州而行都隨陷矣十月大元國兵三道趍福州董右丞敖拉齊蒙古岱都督索多元帥張𢎞範萬户等兵出江西浙東阿嘍罕元帥王世强招討舟師出福州大兵直至處州守臣李珏遁十一月董右丞至瑞安府趙與檡李世逵等禦之敗績世逵遁趙與檡退屯福安城遂降敖拉齊軍至卲武朱浚趙時賞遁至建寧府執趙崇磯張彭老至南劔州王績翁遁大元兵逼行都陳宜中張世傑備海舟于岸乙巳奉景炎帝益王楊淑妃等登舟戊申發舟入海是時正軍十七萬民兵三十萬有竒內淮兵一萬由東港入海與北舟相遇值天霧晦冥不辨舟得以進至泉州問蒲壽庚索軍糧不及應副遂趍潮州至惠州之甲子門駐焉癸丑阿嘍罕王世强舟師至福安府王績翁為內應王剛中以城降朱浚仰藥死文天祥將兵趍廣東入浙十二月景炎帝至廣州守臣薛應龍運使姚良臣迎入州治作行宫張鎮孫除廣東經略使後死於難大元董右丞軍至福安縣趙與檡拒戰敗績死之己丑大元兵攻興化軍知軍趙文龍不降被執至泉州蒲壽庚降至漳州知州黃佺通判楊丙以城降至惠州文璧降璧天祥弟也徐直諒遁景炎帝趍于富場丁丑正月文天祥引兵趍漳州謀入衛道阻不通二月大元國兵檄戍改福安府為福州置宣撫司以潛越友王績翁為副使李雄統領諸部軍後李雄作亂殺潛越友大兵皆去不留一騎三月文天祥入梅州四月蘇劉義卒蘇京湖老將雖出吕氏乃心在王室永嘉推戴實建大功後世傑用事志鬱鬱不得展其人剛躁不可近然能服義終始不失大節而廣中癘氣傳染而死哀哉五月文天祥兵出梅嶺吉贛兵皆來㑹六月大捷于雩都復興國縣於是駐屯遣兵攻贛州諸縣皆復惟城不下龍泉縣孫㮚以邑歸正遇害水新縣令彭震龍以邑歸正遇害架閣蕭明以贛縣義兵收復萬安縣被執死于洪督幹陳子敬招集義兵屯皂據贛下流吉水永豐以次皆復前京尹吳浚以北兵說降天祥集將吏責以大義斬之淮西兵復黃州復壽昌軍六月文天祥兵至吉州戰于終步不利戰于永豐又不利戰于空坑大敗未幾攻贛之兵又敗行府孤立空坑之敗全軍陷沒天祥妻歐陽氏男佛生環生女栁娘環娘妾黃氏顔氏被執幕僚張汴等皆死江西招討趙時賞寺簿劉洙架閣吳文福督幹林棟皆遇害天祥與長子道生客杜㶆以數騎免時處置安撫聚兵數萬在永豐境天祥引兵就之㑹其軍亦潰收散兵復入汀而南劔建寧卲武多有歸正者諸畬軍皆騷動尋為諸路大兵收復天祥兵出㑹昌趍循州是冬天祥兵屯南嶺是月大元兵撤戍張世傑回潮州以圖興復七月壬申張世傑圍泉州將淮軍及吊眼許夫人諸洞畬軍兵威稍振蒲壽庚閉城拒守興化陳瓚起家丁義民五百人應世傑八月謝洪永任進攻泉州南門不克而蒲壽庚隂賂畬軍攻城不力而求救於索多元帥王績翁亦遣人至索多處趣兵十一月丙申索多元帥大兵至福州甲辰至興化守臣陳瓚不降城陷大軍屠城三時乃止血流有聲車裂瓚五門以狥至泉州張世傑解圍去至潮州守臣馬發堅守不下索多元帥棄而之惠州與西省吕師夔軍㑹合攻廣州城陷張鎮孫死之大軍至次仙澳與戰得利尋望南去止碙川碙川屬廣之東管縣與州治相對但隔一水十二月景炎帝舟遷于謝女峽陳宜中捩拖之占城戊寅正月遣舟師防遏海道己酉索多元帥自廣州回再攻潮州馬發固守凡半月至二月癸亥城陷馬發死之屠其城二月大軍檄戍景炎帝由海道再回廣三月文天祥兵出惠州海豐縣駐麗江四月戊辰景炎帝崩于碙川衛王本末戊寅四月庚午衛王即位于碙川景炎帝既崩官將欲散獨尚書陸秀夫不可曰諸君散去可也度宗一子尚在將焉置此古人有一成一旅興者今百官有司軍士亦且萬餘人若天道未絶趙祀此豈不可為國耶乃相與奉衛王即位于柩前改元祥興時有黃龍升天以陸秀夫為丞相張世傑太傅文天祥少保六月祥興帝遷于崖山崖山在海中兩山相對勢頗寬廣中有一港其口如門可以藏舟世傑以為形勝之地乃屯駐於此造行宫六月入山伐木造軍屋千間起行宫三十間內正殿以楊太妃故立名慈元殿時官民兵除逃竄死亡外猶計二十萬多於船上住坐資糧取辦廣右諸郡海外四州拘刷人匠蓋海院造船隻治兵器自六月至十月始罷十月文天祥引兵至潮陽平羣盜人心翕然大兵至崖山張萬戶舟師自海道入廣過崖山有龍橫海舟不得前射之雲霧晝晦遂退攻潮陽姚良臣為右丞相夏士林參知政事王德同知樞密院張德為殿前都㸃檢十一月文天祥兵潰被執時元帥張𢎞範以水陸兵奄至潮陽天祥引避山谷行且數日𢎞範以輕騎直趍掩其不備天祥被執服腦子二兩昏眩久之竟不死越七日至帥營天祥踴躍請劔曰此吾死所也元帥必欲以禮見天祥曰吾不能跪吾嘗見巴延阿珠長揖而已或曰奈何不拜天祥曰吾為國死何拜爾為張知不能屈遂以平揖相見蓋嵗除前三日也明年正月二日張元帥脅天祥下海州十日至崖山元帥令天祥以書招世傑天祥曰我不能救父母乃教人背父母得乎有死而已不能從也乃作詩復命云人生自古誰無死留取聲名照汗青忠國之心終始弗替元帥又謂天祥曰國亡矣政使殺身為忠誰復書之天祥曰商非不亡夷齊自不食周粟人臣各盡其心何論書與不書元帥為之改容乃驅之過北道經吉州痛憤不食八日不死乃復食十月至樞密院引問天祥酬對不屈繫獄月餘再引問愈不屈留燕經年至至元壬午朝廷賜死猶南面而跪念念不忘君父若是耶張毅甫負公骨殖歸葬至之日母夫人之柩同日至自廣州人謂忠孝所感天祥年四十七而歿為人豐下兩目炯然善談論有忠孝大節自起兵勤王以至高亭引見議論不屈忠肝義膽出於至誠聞之莫不興起驅之北行京口得脫間關萬死由海道還國赤手起兵又經三年江西之役大事幾集英雄無用武之地卒以困敗或謂子明知其不可為而為之譬猶父母有病證已難療豈可聽其自斃而不求醫投之匕劑猶望其可以更生是烏可以成敗論哉所居對文筆峯自號文山為文章未嘗屬稿引筆滔滔不竭尤長於詩有指南吟嘯集行妻歐陽氏亦守節而死天祥為祭文曰忠臣不事二君烈女不更二夫天上地下惟汝與吾天祥弟璧知惠州奉母夫人就養歸附後厯廣西宣慰使天祥歎曰兄為國弟為家各行其志云丁未葬景炎帝于崖山己卯正月辛酉大兵攻崖山張世傑不守山門集舟千餘作一字陳禦之而大兵入山門作長蛇陳對之崖山有船千餘艘內大船極多張元帥大小船五百而二百舟失道久而方至行朝依山作一陳幫縳不可復動於是不可以攻人而專受攻矣張元帥至崖山港外停舟喚張世傑打話不從又令文天祥以書諭世傑天祥不從時陳宜中如占城乞師久不還張元帥語崖山人曰汝陳丞相已去文丞相且為我所執汝何戰云約二月初六日大戰二月癸未我師敗績大元軍絶其薪水道崖山人食乾飲鹹者十餘日皆疲乏不能戰大元軍乘潮而進兩軍大戰半日南軍大敗世傑乘霧雨昏冥擁祥興帝及楊太妃脫去丞相陸秀夫抱宋衛王赴海死陸秀夫字君實文筆英妙自維揚幕入朝京師永喜推戴有力及駐崖山凡朝廷事皆秀夫潤色綱紀之秀夫至此知無可奈何乃取舟中物悉沈之仗劔驅其妻子赴水妻挽舟不可赴水秀夫曰爾去怕我不來於是登御舟啓上曰國事至此陛下當為國死太皇后辱已甚陛下不可以再辱抱宋衛王俱投水中御舟一白鷴奮擊躑躅哀鳴良久竟與籠俱墜水中內翰劉鼎孫侍郎茅湘吏部趙樵等溺者數萬張世傑奉楊太后以小舟奔四日遇大風舟將及岸矣舟人催舟師疾進世傑曰無以為也為我取瓣香來香至仰天呼曰我所以為趙氏者亦已至矣一君亡復立一君今又亡者我奉皇太后走者庶幾敵兵退别求趙氏立之以存趙祀耳今若此天意果何如耶若天不欲我復存趙氏祀者則大風覆吾舟舟遂覆宋傳天下以仁而國勢嘗病於不振孝宗自謂我朝家法逺過漢唐惟用兵一事不及蘇洵論勢亦謂惠䙝而威不振賞數加於無功敗軍之罰不加嚴弱勢浸淫其來非一日然渡江以來君無失德理宗朝四川殘害三面被兵淮甸擾攘雲南有警左支右吾猶能扶持四十二年之天下度宗嗣位一國之事權奸賈似道實專之度宗崩太皇太后與幼君不過建空名於六服之上且如己未庚申渡江東南之危如一髮之引千鈞似道在鄂城下之盟許納嵗幣而大元之師始歸似道乃欺理宗詭曰戰勝而嵗幣又食前言及大元遣使責償拘留真州不報又遣使荆湖而似道又留之漢陽之純口始則請盟終則背盟似道知之天下知之獨朝廷不之知爾宋太祖常曰宰相須用讀書人似道以寵妃之弟不學無術處非其任無休休有容之量忌嫉之念橫於胸臆好諛惡直進佞退賢粉飾太平諱言邊事殺功臣以失士大夫之心行公田以斂江浙之怨主推排以騷動東南之民造士籍以鉗制東南之士庇敗將則將校之心離吝軍劵則軍旅之心叛日積月纍無非失人心之事人謀之不臧如此雖然國之興亡亦有天數與天理存焉爾邵雍著皇極經世書推明皇帝王伯之數有元㑹運世之說謂冬復為春世復為元今大元溷一揭宋之土地而歸職方國號曰元年號曰元豈非世復為元之數乎宋以周顯德七年受禪至十六傳而幼君名顯改元德祐合顯德二字彰著於命名改號之間人不之覺豈非數之終於此乎前宋以丙午丁未而遭金禍推論五行者謂宋以火德王故能水勝火其後丙午丁未則上下兢兢以度厄運今以丙子丁丑歸大元豈非子者午之對丑者未之對而納音亦有水勝火之義乎宋有天下圖䜟久有過唐不及漢之說漢四百一十一年唐二百八十六年宋自建隆庚申開基至德祐乙亥凡三百一十六年豈非過唐不及漢之應乎此天數之應如此宋太祖受周太后恭帝禪杜太后將終召太祖曰汝自知所以得天下乎政由柴氏使幼兒主天下羣心不附若周有長君汝安得至此豈料三百年後似道貪權利於立幼卒至覆國是亦其初取於孤兒寡婦之報也宋待柴氏最厚事太后如母撫幼君如子恭惟大元待宋后幼君禮意猶篤是亦其初待柴氏之報也國既為宋柴氏族屬並無誅戮崇義之封終三百年如一日今大元於趙氏於族屬一無所間亦其初不殺柴氏之報也大祖之入京城兵不血刃市不易肆列國諸郡聞風而降今大元兵鋒所至降者不殺過江以來迎降恐後郡縣城邑市井依然是亦其初不妄殺人之報也此天理之報者如此宋太祖生於丁亥以庚申嵗建國命曹彬平江南王師係甲戍嵗渡江以乙亥丙子而平江南丙子嵗是為開寶九年今大元太祖聖武皇帝亦生於乙亥以庚申嵗即位命巴延平江南大軍亦係甲戌嵗渡江以乙亥丙子而平江南丙子嵗是為至元十三年宋太祖得國之時有䜟云十一卜人小下月十五團圓十六缺至幼君恰十六傳亦非偶然國之興亡係乎天數而亦關於人才之盛衰太祖開基人才輩出列聖相承國致平治自王吕擅權章蔡用事小人夤緣為姦或為爪牙或為鷹犬或號傳法沙門或稱護法善神釀成靖康之禍髙宗中興倘無張韓劉嶽之徒幾不可為國矣而時有中興之臣而無中興之君惜哉度宗以來內無賢相外無良將雖有忠良之臣反擯弃而不用束手待斃可為長太惜可為流涕者也然忠節之士何代不有疾風知徑草板蕩識純臣語曰無求生以害仁有殺身以成仁孟子曰捨生而取義信哉蓋死者人之所難而得其死者尤難也主憂臣辱義在必死夫食君之祿死君之難不以生死易其節此誠烈丈夫也嗚呼故臨難守節者常足以動敵國之敬歎蓋忠義亦人心所固有也符秦之攻晉也嘗歎曰周孟威不屈於前丁彥逺潔已於後吉祖冲閉口而死何晉氏之多忠臣也金人攻宋見李若水死節歎曰南朝惟李侍郎一人然靖康之難死節五十餘人忠魂義魄至今耿耿斗牛間史為直筆安能為斯人隱今大元混一識天時而歸附者固皇帝之所嘉盡臣道而死節者亦皇帝之所重豈可弃而不録哉其間死城郭封疆者固不能盡知其所知者若李芾死於潭天祥死於北庭芝死於兵唐震昻發死於郡治江萬里徐應儦鄧得遇尹榖赴水死謝枋得不食死朱浚仰藥死其他如姜才孫虎臣邊居誼牛臯范大順張漢英趙文義王安節馬塈馬發陳瓚米立趙孟錦司馬夢求其中儒臣死節尤表表在人耳目間歐陽修作五代史謂吾於死節之士得二人焉今數人者史氏亦當以歐陽之筆表而出之庶可發潛德之幽光云宋季三朝政要卷六
