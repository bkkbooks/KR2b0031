body:
  text: 宋季三朝政要卷四度宗乙丑咸淳元年春詔郡國長吏勸課農桑録先儒後除徐直方為史館校勘直方之父元杰為史相所毒直方以是不肯出仕時人高之至有是除榮王與芮進封福王黃氏封隆國夫人上即位稱皇叔賜詔書不名上以諒隂命宰臣類試阮登炳以下依廷試例出身命儒臣日侍經筵賈似道再入相上即位察知巴陵之事非其本心贈太師保靜鎮潼軍節度使濟王封鎮王賜諡昭肅上幸太學升邵雍司馬光從祀參政皮龍榮上東宫舊僚也居潭州知似道忌之杜門不預人事一日上偶問龍榮安在似道恐其再相時李雷應憲湖南隂諷雷應劾之雷應至潭訪龍榮龍榮托故不出既退以小鬼斥之或以語雷應雷應不能平遂疏其貪利營私之罪又謂每對人言有吾擁至尊於膝上之語蓋龍榮曽為東宫官也有旨謫衡州衡州乃雷應治所皮懼自鴆死冬十月飭諸路帥臣警邊備丙寅咸淳二年春詔舉亷吏升泗水侯從祀臨安府士人葉李蕭至等上書詆似道專權害民誤國似道怒嗾林德夫告李等泥金飾齋扁不法京尹劉良貴以聞加李等罪黜竄逺州以季可為察院賈相當國益忌臺諫言事悉用庸懦易制者為之彈劾不敢自由惟取逺州太守及州縣小官毛舉細過應故事而已謝方叔罷相歸豫章一日以琴一張丹藥一爐獻上蓋以舊學故也賈似道疑其有觀望再相之意令全臺劾之以為不當誘人主為聲色之好欲謫逺郡賴吕文德以已官職贖丞相之罪遂得免論者曰專權忌能賈固不能無罪居間貢獻謝亦有以取之也襄陽自開互市以來北兵囚互市築城置堡江心起萬人臺立撒星橋以遏南兵之援乙丑丙寅年間時出師哨掠襄樊城外兵威漸振未幾文德死而以文煥代守襄陽丁卯咸淳三年春詔貢舉以識治體為先封曽參邴國公孔伋沂國公配享先聖顓孫師封陳國公升十哲之位賈似道平章軍國重事魏國公葉夢鼎為右丞相時似道專政夢鼎充位而已似道一月三赴經筵三日一朝赴中書堂治事上初政一委大臣似道益自專上稱之曰師臣通國稱之曰師相曰元老居西湖葛嶺賜第五日一乘湖船入朝不赴都堂治事吏抱文書就第呈署宰執書紙尾而已朝夕謀議內則館客廖瑩中外則堂吏翁應龍凡臺諫彈劾諸司薦辟舉削及京尹浙漕處斷公事非關白不敢自擅在朝之士忤意者輒斥去趙葵上疏告老還鄉冬十月卒戊辰咸淳四年閏正月初六天明大風雷雨居民屋瓦皆動日午楊美人降生皇子北兵圍襄陽吕文煥告急乃遣高達范文虎赴援北兵於要害處連珠劄寨圍數十里不得通達與文虎亦不用命賈似道請出督而隂又嗾臺臣以留之實無意於出也冬十月朔日蝕是日不視事夫人俞氏降生太子三學士人上書乞調諸路兵併力救襄不報賜武夷書院額仍設山長一貟汪立信以書抵賈似道陳三策一謂內地何所用乎多兵宜盡抽之以過江可得六十萬百里或二百里置一屯皆設都統七千里江面才三四十屯設兩大藩府以總攝運掉之緩急上下流相應必無能破吾聨落之勢者久之日益進亦可二謂久拘使者在京湖何不議遣使偕行啖以厚利緩其師期年嵗間我江外之藩垣成氣象固江南之生兵益增矣三謂兩説不可行惟有凖備投拜其意蓋以激賈行第二策也賈得書大怒曰瞎賊敢爾妄語迄諷臺諫罷之立信歸金陵不數月北師渡江九江以下皆失守乃以端明招討起公則已無地席矣立信過淮時賈相出督相遇拊立信背而哭曰端明端明似道不用公言遂至此立信對云平章平章瞎賊今日更説一句不得今江南無一寸乾淨地立信去尋一片趙家土上死也要死得分明後抵高郵伯顔丞相聞其名欲迎取之立信得報拊案大哭曰吾猶幸得在趙家地上死也竟大慟而絶時高郵未歸附云上試進士賜陳文龍以下及第出身有差文龍元名子龍唱第日賜今名李瓘登第自念祿不及親援淳熙王昻紹興李僑嘉定史公亮史天應納祿封父母故事以其官回授其父乃挂冠而歸十一月皇后全氏降生皇子羣臣稱賀寶武妖冦數千人破祗陽縣羅廷諫殱其首餘出降己巳咸淳五年春詔舉人才葉夢鼎辭位不允徑去上在經筵令儒臣講周易江萬里左相馬廷鸞右相輪日知印禁珠翠都人以碾玉為首飾宫中簪琉璃花都下人爭效之時有詩云京城禁珠翠天下盡琉璃識者以為流離之兆明堂大赦北兵哨濠州常州雞翼生距庚午咸淳六年春詔貢舉精於擇人為先江萬里請援兵救襄似道不答竟以議事不合乃罷去詔諸帥閫舉堪將材者各二人馮夢得中書舍人請置士籍時賈相患舉人猥衆御史陳伯大請置士籍開具鄉貫姓名年甲三代所習經賦娶妻姓氏令士人書之鄉鄰著押保結於科舉條制並無違礙方許納卷議者謂士而有籍與禁何異又嚴後省覆試法比校中省舉人元卷字縱玄異者黜之覆試之日露索懷挾辛未榜李鈁孫者少時戲雕摩㬋羅於股間懼搜者之見蒙紙其上搜者視之駭曰此文身者事聞被黜當此邊事危急之際束手無策而以科舉苦舉子何其繆耶上一日問似道曰襄陽之圍三年矣奈何對曰北兵已退去陛下得臣下何人之言上曰適有女嬪言之似道詰問其人誣以他事賜死自是邊事無人敢對上言者辛未咸淳七年上試進士賜張鎮孫以下及第出身有差國朝廷試始於開寶癸酉終於咸淳辛未廷試之日天必開霽是嵗大雨如注天不言以象示之而已趙嗣德登第乞援李瓘等乞回本身官致仕恩例封贈父母上從之陳仲微為侍左郎官以言事切直罷王唐圭為司農簿以輪對言天下守令不得人忤似道罷淮西制置司申襄圍不解乞調兵增戍催造戰船以備江面是嵗韃靼國建國號曰大元取易經乾元之義以明資始之功冬出師哨掠淮甸邊報愈急似道占湖山之勝作半間堂延羽流塑已像其中內殖貨利蠱聲色寵妾葉氏本淑妃閣宫人也潘氏倪氏妓也取而有之令陳振談玉趙與柟等廣收竒器異寶聞余玠有玉帶發塜取之劉震孫有玉鈎桶本安丙家物不獻罷去建多寶閣日一登玩其間門客朝士稱功頌德頌説太平誇咸淳為元祐尊似道曰周公諛言溢耳不復加意邊事壬申咸淳八年春詔舉亷律貪馬庭鸞罷相葉夢鼎再相夏五月張順張貴赴援襄陽襄樊自丁卯以來被圍日久生兵日增既築鹿門之役水陸之防日密築白河虎頭及思關以鋭出入之道自是孤城閉守者凡四五嵗援兵往往扼關不克進所幸城中有宿儲可恃所乏者鹽薪布帛爾張漢英守樊城募善泅者置蠟書於髻中藏積草下浮水而出謂鹿門既築勢須自荆郢救援既至隘口守者見積草多鈎致欲為焚㸑用遂為所得於是郢鄧之道復絶矣既而荆閫移屯郢州而諸帥重兵皆駐新郢及均州河口以抱要津又重賞募屯士得三千人皆襄郢山西民兵之驍悍善戰者求將難其人得民兵部轄張順張貴軍號張貴為矮張所謂大張都統小張都統者其智勇為諸軍所服先於均州上流名中水立便寨造水哨輕舟百艘每艘三十人鹽袋布二百且令之曰此行有死而已至是溪水方生於二十二日稍進圜山下越二日又進高頭港口結方陳各船置火槍火炮熾炭巨斧夜漏下三刻起船出江以紅燈為號貴先登順為殿乘風破浪輕犯重圍至洪磨灘以上敵舟布滿江面無罅可入鼓勇乘鋭風斷鐵綆攢筏數百屯衆皆披靡以避其鋒轉戰一百二十餘里二十五日黎明抵襄城城中援救久絶至大喜及收軍點視乃失張順軍中為之短氣數月有尸浮而上被甲胄執弓矢者乃張順也九月祀明堂賈似道為大禮使駕幸景靈宫回宿太廟質明有司奏申嚴外辨請申玉輅大雨如注胡貴嬪之兄帶御器械胡顯祖檢討開禧登輅遇雨乘逍遙子故事面奏上白賈賈欲俟雨止登輅顯祖回奏平章已允上遂冒雨乘逍遙子直入和寧門百官愕然莫知所以禮成肆赦似道奏臣充大禮使而陛下舉動不得預聞乞罷政即出嘉會門三降御筆勉留乃還朝鐫罷胡顯祖出胡貴嬪為尼上為之泣下癸酉咸淳九年春正月詔舉士以明體適用之學平地産白毛臨安尤多如銀線菜以相饋但挺直爾或者謂白眚白祥之類是也葉夢鼎罷相二月大元破樊城下襄陽文煥捍禦應酬備殫甚力糧食雖可支吾而衣裝薪芻斷絶不至文煥徹屋為薪緝關為衣每一巡城南望慟哭城破遂以城降文煥獨守孤城似道坐視而不救降於六年之後豈得已哉御史陳伯大奏言科場弊幸百出有發解還省而筆迹不同者有冒已死人解帖免舉者請今後應舉及免舉人各於所屬州縣給厯一道親書厯首將來赴舉過省參對筆迹異同以防偽濫賈似道奏自襄樊敗後纍章乞出視師而陛下不許臣出今事勢如此非臣上下驅馳聨絡氣勢作急奔赴則大可慮者上曰師相不可一日離左右似道陽請出督隂諷朝廷留行但於中書省置機速房茍且條邊瑣而已文天祥知贛州兼江西提刑樊城陷牛臯范大順張漢英死之甲戌咸淳十年正月己卯朔永新有氣如虹霓自東門江中起橫貫一邑須臾變作錦紋狀遮蓋四門省試士人各給一號書就省人姓名印押如衛士直入宫門之狀於門下兩處辨驗不許登仕免舉至乙亥仍許登仕免舉賈似道丁母憂歸越治喪陳宜中簽書樞密院詔賈似道起復秋七月上崩上自為皇太子時以好內聞既立耽于酒色賈似道以策立功制國命上拱手而已初理宗議建東宫夢若有人告曰此十年太平天子上即位至崩正十年壽三十五上廟號曰度宗上崩議立長益王是宰相請立嫡遂以長子顯即位太皇太后垂簾聽政改明年為德祐元年是嵗殿試度宗以疾未及臨軒而崩上諒隂類試王龍澤等比廷試出身策問求賢時似道方惡言者吉州人胡幼黃以舍和吐氣為説而榜第三士論恥之冬詔天下勤王九月大元丞相巴延大會兵于襄樊丁亥沿漢江而下前後延袤旌旗數百里水陸並進用我降人為向導吕文煥等舟師出襄陽劉整等騎兵出淮泗萬户武顯等前鋒襲郢州至灤水時值雨淋漲溢無舟可渡遂駐兵于漂水之濵巴延大軍繼至武顯趍迎馬首告曰漂水泛溢軍馬懼其漂沒以故待之巴延曰此水小不敢渡敢渡大江耶佇鴈軍中召一壯士負甲使渡水而軍馬長驅悉渡遂至郢州軍于郢城之西郢城在江北岸以石為之高接山形矢石莫能近新城在江水中密樹樁木以絶舟楫往來下流黃家原置城守禦備具攻之不下郢人堅守以戰船橫截江面不得渡文煥觀郢之形勢其黃家原堡西有溝渠深闊數丈霖雨月餘其水漲溢南通一湖至江甚近可令戰艦平達大江以避郢軍巴延諸將告曰郢城乃我之喉襟今不取而過後為歸路患巴延不聽忽報黃家原堡已剋而分兵圍郢不能下巴延遣兵治平江堰破竹為􅀢地蕩舟而過郢城遂入漢江自陸地牽舟迂行凡百餘里然後至水十一月戊子巴延大軍發郢城阿珠及諸將帥不滿百騎殿後而進郢州都統趙文義帥精兵數千騎追之巴延阿珠回渡迎敵文義凡二十餘戰久而敗績文義死之巴延舟師忽自上而下遂至沙洋守將串樓王等堅壁不降巴延軍中有相士李國用者能祭風風遂大起巴延令炮手張元帥順風以火炮攻之煙熖燎天俄而城陷守將串樓王為其所獲巴延大軍由沙洋五里地遂至新城巴延令其軍衆以沙洋殺戮軍人首級列于城下執縳沙洋將串樓王等四人望城呼曰邊都統宜速歸降如其不然禍在目前都統邊居誼堅壁不降巴延纍遣人招諭居誼索文煥來打話文煥乘騎至城下城上弓矢如雨文煥中其右臂拒城避之居誼率所部三千人盡力死戰竟無一人歸附巴延大兵至復州誘守臣翟貴曰汝曹知幾而降有官者仍居其官吏民安堵如故衣冠仍舊市肆不易秋毫無犯關會銅錢依例行用安撫翟貴以城降巴延大會諸將議渡江事遣總管劉深千户馬福觀沙湖水勢令諸將皆趍漢口渡江諸將以漢江水急且有守禦巴延不聽徑過淪河蔡店去漢口甚近是日圍漢陽軍取漢口渡江夏貴併力守禦巴延軍夜回淪河太皇有旨國步多艱沿江青野應三學及京學流寓遊學士人權與放散各令逐便十二月辛亥巴延自漢口開壩引船入輪河轉至沙武口達于大江壬子巴延以戰艦相尾而至夏貴帥漢鄂舟師上流迎敵夜襲北營不克而還沙武口南岸防禦甚至巴延遂趍陽羅堡癸丑夏貴以戰艦數千列于大江之下橫其江面巴延軍不敢近乃遣人招諭諸將僉言我輩纍受大宋重恩政當戮力死圖報功此其時也安有叛逆歸降之理備吾甲兵決之今日我宋之天下賭博孤注輸贏在此一擲爾巴延進兵攻陽羅堡城竟日不克巴延與阿珠謀謂宋將之心謂我必拔此陽羅堡可以渡江况此堡堅攻之不克若今夜令汝以鐵騎三千泝舟泝流而上趍視其陳料彼上流雖有備而不堅常為搗虛之計以來日詰旦且渡江襲南岸是夜阿珠統軍遂行於上流二十里泊於青山磯中夜帥舟戰於江中已登南岸巴延乃遣兵攻陽羅堡以舟師直衝我軍大戰江中夏貴敗績順流而下沿西南岸放火歸廬州是時其心已無國矣守將閬池王都統與所部八千人死戰中流矢而死陽羅堡乃江鄂屏蔽一帶有七伯拗風起則多利北舟欲守江鄂當守此堡此堡既失則鄂危矣巴延遣兵自陽羅堡攻鄂州戊寅下鄂州守臣張晏然降先是李雷奪為守十月以臺論罷至是無正官張晏然守鄂所恃者朱祀孫之援朱祀孫提重兵至鄂退歸江陵宴然失助鄂遂降矣夏貴為江面遊擊策應大使朱祀孫為宣撫制置使夏貴與朱祀孫通任長江之責夏歸廬州朱歸荆湖一上一下中流蕩然全無備禦哀哉癸巳上以賈似道為都督軍馬黃萬石李珏參贊軍事檄召諸路軍馬聽督府調遣於封樁庫撥金十萬兩銀五十萬兩關子一千萬貫充都督公用時邊報轉急似道猶未有行意至德祐二年正月劉整死乃議出師保康承宣使閻桂獻銀一萬兩充招軍費王侯邸第輸助軍錢榖有差天目山崩天目為杭之主山山崩則王氣歇矣辛未度宗皇帝梓宫發引文武百官衰服出城奉辭靈駕揚州阮克已糾集民兵三萬勤王分兵九路會合端明黃萬石屯兵江西侍郎趙溍屯兵金陵開府夏貴屯兵淮西節度使咱萬夀屯兵京湖殿帥張彥屯兵廣德招討孫虎臣屯兵采石都統仇子真屯兵宣城練使張世傑屯兵海道費克恭阮克已屯兵平江宋季三朝政要卷四
